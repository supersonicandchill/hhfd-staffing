/* ── Drag ghost: animated stick figure ── */

/* Body sway — applied to the whole #drag-ghost wrapper */
@keyframes bodyDangle {
  0%,100% { transform: translate(-50%, -100%) rotate(-8deg); }
  33%     { transform: translate(-50%, -107%) rotate(8deg);  }
  66%     { transform: translate(-50%, -103%) rotate(-4deg); }
}

/* Individual limb animations — applied via .ghost-* classes on SVG groups */
@keyframes figureKick {
  0%   { transform: rotate(-10deg); }
  25%  { transform: rotate(10deg);  }
  50%  { transform: rotate(-15deg); }
  75%  { transform: rotate(12deg);  }
  100% { transform: rotate(-10deg); }
}
@keyframes legL {
  0%,100% { transform: rotate(-20deg); }
  50%     { transform: rotate(30deg);  }
}
@keyframes legR {
  0%,100% { transform: rotate(30deg);  }
  50%     { transform: rotate(-20deg); }
}
@keyframes armL {
  0%,100% { transform: rotate(-5deg);  }
  50%     { transform: rotate(20deg);  }
}
@keyframes armR {
  0%,100% { transform: rotate(20deg);  }
  50%     { transform: rotate(-5deg);  }
}

#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  display: none;
  flex-direction: column;
  align-items: center;
  /* base transform; animation overrides it */
  transform: translate(-50%, -100%);
}
#drag-ghost.active {
  display: flex;
  animation: bodyDangle 0.5s ease-in-out infinite;
}
#drag-ghost svg {
  overflow: visible;
  filter: drop-shadow(0 4px 16px rgba(249,115,22,0.7));
}

/* SVG group animations — transform-origin set via svgOrigin attribute trick */
.ghost-body  { animation: figureKick 0.45s ease-in-out infinite; transform-box: fill-box; transform-origin: center top; }
.ghost-armL  { animation: armL 0.4s ease-in-out infinite;        transform-box: fill-box; transform-origin: 24px 32px; }
.ghost-armR  { animation: armR 0.4s ease-in-out infinite;        transform-box: fill-box; transform-origin: 24px 32px; }
.ghost-legL  { animation: legL 0.38s ease-in-out infinite;       transform-box: fill-box; transform-origin: 24px 44px; }
.ghost-legR  { animation: legR 0.38s ease-in-out infinite;       transform-box: fill-box; transform-origin: 24px 44px; }

#drag-ghost .name-tag {
  background: rgba(249,115,22,0.95);
  color: #fff;
  font-family: 'Inter', monospace, sans-serif;
  font-size: 11px;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 20px;
  margin-top: 2px;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(249,115,22,0.5);
  letter-spacing: 0.3px;
}

/* Hide cursor everywhere while dragging */
body.is-dragging,
body.is-dragging * {
  cursor: none !important;
}
</style>

// Single mousemove handler registered once (bug 1 fix)
let _ghostActive = false;
document.addEventListener('mousemove', (e) => {
  if (!_ghostActive) return;
  const ghost = document.getElementById('drag-ghost');
  if (ghost) {
    ghost.style.left = e.clientX + 'px';
    ghost.style.top  = e.clientY + 'px';
  }
});
// Safety net: if dragend fires anywhere, kill the ghost (bug 2 fix)
document.addEventListener('dragend', () => {
  _ghostActive = false;
  const ghost = document.getElementById('drag-ghost');
  if (ghost) ghost.classList.remove('active');
  document.body.classList.remove('is-dragging');
});

function useDragGhost() {
  function startGhost(name) {
    const ghost  = document.getElementById('drag-ghost');
    const nameEl = document.getElementById('drag-name');
    if (!ghost || !nameEl) return;
    nameEl.textContent = name;
    ghost.classList.add('active');
    document.body.classList.add('is-dragging');
    _ghostActive = true;
  }
  function stopGhost() {
    _ghostActive = false;
    const ghost = document.getElementById('drag-ghost');
    if (ghost) ghost.classList.remove('active');
    document.body.classList.remove('is-dragging');
  }
  return { startGhost, stopGhost };
}

function load(key, fallback) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; } catch{ return fallback; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch{} }

// ─── UTILS ───────────────────────────────────────────────────────────────────
let _c = Date.now();
function uid() { return "u"+(++_c).toString(36); }
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function daysBetween(a, b) {
  const da=new Date(a+"T12:00:00"), db=new Date(b+"T12:00:00");
  return Math.round((db-da)/(1000*60*60*24));
}
function getShiftUnit(anchor, targetDate) {
  const unitOrder = ["1","2","3"];
  const anchorIdx = unitOrder.indexOf(anchor.unit);
  const diff = daysBetween(anchor.date, targetDate);
  const unitIdx = ((anchorIdx + diff) % 3 + 3) % 3;
  return unitOrder[unitIdx];
}
function getMonthShifts(year, month, anchor) {
  const days = [];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const unit = getShiftUnit(anchor, ds);
    days.push({ date:ds, day:d, unit, isToday: ds===todayStr() });
  }
  return days;
}
function fmtDateLong(s) {
  if(!s) return "";
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
}
function fmtDateShort(s) {
  if(!s) return "";
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

  staffedGlow:"0 0 0 1px #065f46, 0 0 16px #34d39920",
};

const GLOBAL_CSS = `
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; }
@keyframes staffedPulse {
  0%,100% { box-shadow: 0 0 0 1px #065f46, 0 0 12px #34d39918; }
  50%      { box-shadow: 0 0 0 1px #065f46, 0 0 22px #34d39938; }
}
@keyframes fadeSlideIn {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}
.staffed-card { animation: staffedPulse 3s ease-in-out infinite; }
.fade-in { animation: fadeSlideIn .2s ease both; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#1e3450; border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:#2d4d6e; }
`;

function GlobalStyles() {
  return <style dangerouslySetInnerHTML={{__html:GLOBAL_CSS}}/>;
}

function Btn({ children, onClick, variant="secondary", size="md", disabled=false, style:ex={} }) {
  const V = {
    primary:   { bg:"#ea6c0a", text:"#fff",     border:"#f97316", shadow:"0 3px 12px #f973165a" },
    secondary: { bg:"#1a2d45", text:"#90aecb",  border:"#2d4d6e", shadow:"0 2px 6px #00000050" },
    danger:    { bg:"#881337", text:"#fda4af",  border:"#be123c", shadow:"0 2px 8px #fb71853a" },
    success:   { bg:"#065f46", text:"#6ee7b7",  border:"#059669", shadow:"0 2px 8px #34d3993a" },
    ghost:     { bg:"transparent", text:"#90aecb", border:"#1e3450", shadow:"none" },
  };
  const v = V[variant] || V.secondary;
  const pad = size==="sm" ? "5px 11px" : size==="lg" ? "11px 24px" : "8px 16px";
  const fs  = size==="sm" ? 11 : size==="lg" ? 15 : 13;
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ background:v.bg, color:v.text, border:`1px solid ${v.border}`, borderRadius:8,
               padding:pad, fontSize:fs, fontWeight:700, cursor:disabled?"not-allowed":"pointer",
               display:"inline-flex", alignItems:"center", gap:5, whiteSpace:"nowrap", flexShrink:0,
               boxShadow:v.shadow, opacity:disabled?.45:1, letterSpacing:.2, transition:"opacity .1s",
               ...ex }}>
      {children}
    </button>
  );
}

const base = {
  app:   { fontFamily:"'Inter',system-ui,sans-serif", background:C.bg0, minHeight:"100vh", color:C.text },
  hdr:   { background:`linear-gradient(180deg,${C.bg2} 0%,${C.bg1} 100%)`, borderBottom:`1px solid ${C.border}`,
           padding:"0 20px", display:"flex", alignItems:"center", gap:14, height:62,
           position:"sticky", top:0, zIndex:300, flexShrink:0,
           boxShadow:"0 1px 0 #1e3450, 0 4px 20px #00000060" },
  logo:  { fontFamily:"monospace", fontWeight:900, fontSize:16, color:C.accent, letterSpacing:4,
           textShadow:`0 0 20px ${C.accent}60` },
  card:  { background:C.bg1, border:`1px solid ${C.border}`, borderRadius:12, padding:16 },
  input: { background:C.bg0, border:`1px solid ${C.border}`, borderRadius:8, color:C.text,
           padding:"9px 13px", fontSize:13, outline:"none", width:"100%",
           transition:"border .15s", boxSizing:"border-box" },
  lbl:   { fontSize:10, fontWeight:700, color:C.textMuted, textTransform:"uppercase",

function CertChips({ certs }) {
  const active = CERT_DEFS.filter(c=>certs[c.key]);
  if (!active.length) return null;
  return (
    <span style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
      {active.map(c=>(
        <span key={c.key} style={{ background:c.color+"18", color:c.color,
          border:`1px solid ${c.color}40`, borderRadius:4, padding:"1px 5px",
          fontSize:9, fontWeight:800, letterSpacing:.5 }}>
          {c.key.slice(0,3).toUpperCase()}
        </span>
      ))}
    </span>
  );
}

function UnitBadge({ unitKey, small }) {
  const u = unitDef(unitKey); if (!u) return null;
  return (
    <span style={{ background:u.bg, color:u.text, border:`1px solid ${u.border}`,
      borderRadius:5, padding:small?"1px 6px":"3px 9px",
      fontSize:small?9:11, fontWeight:800, letterSpacing:.6, flexShrink:0,
      boxShadow:`0 0 6px ${u.color}30` }}>
      {u.label}
    </span>
  );
}

function AbsenceBadge({ absKey }) {
  const a = absenceDef(absKey); if (!a) return null;
  return (
    <span style={{ background:a.color+"20", color:a.color, border:`1px solid ${a.color}50`,
      borderRadius:5, padding:"2px 7px", fontSize:10, fontWeight:700,
      display:"inline-flex", alignItems:"center", gap:4 }}>
      {a.icon} {a.label}
    </span>
  );
}

function Modal({ title, onClose, children, width=460 }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(3,9,18,.88)", zIndex:500,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16,
      backdropFilter:"blur(4px)" }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="fade-in" style={{ background:C.bg2, border:`1px solid ${C.borderHi}`,
        borderRadius:16, width:"100%", maxWidth:width, maxHeight:"92vh",
        display:"flex", flexDirection:"column",
        boxShadow:"0 32px 80px #000000b0, 0 0 0 1px #1e3450" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"15px 20px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <b style={{ fontSize:15, color:C.text, fontWeight:800 }}>{title}</b>
          <Btn onClick={onClose} variant="ghost" size="sm">✕</Btn>
        </div>
        <div style={{ padding:20, overflowY:"auto", flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

function Confirm({ msg, onYes, onNo, yesLabel="Delete", yesVariant="danger" }) {
  return (
    <Modal title="Confirm" onClose={onNo} width={380}>
      <p style={{ margin:"0 0 20px", color:C.textSub, lineHeight:1.7, fontSize:14 }}>{msg}</p>
      <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
        <Btn onClick={onNo} variant="ghost">Cancel</Btn>

function FilterPill({ label, active, color, onClick }) {

      style={{ background:active ? color+"ee" : C.bg2,
               color: active ? "#fff" : color || C.textSub,
               border:`1px solid ${active ? color : C.border}`,
               borderRadius:20, padding:"5px 13px", cursor:"pointer",

// ════════════════════════════════════════════════════════════════════════════
// TODAY / DAY STAFFING — drag & drop board
// ════════════════════════════════════════════════════════════════════════════
function DayBoard({ roster, stations, dayState, onChange, shiftUnitKey, compact, duties, thresholds }) {
  const dragEmpId = useRef(null);
  const [dragOver, setDragOver] = useState(null);
  const { startGhost, stopGhost } = useDragGhost();

  const { onDuty: onDutyIds, assignments, notes } = dayState;
  const tMin = thresholds?.min ?? 16;
  const tMax = thresholds?.max ?? 20;

  const assignedSet   = useMemo(()=>new Set(Object.values(assignments).filter(Boolean)),[assignments]);
  const onDutyList    = useMemo(()=>roster.filter(e=>onDutyIds.includes(e.id)),[roster,onDutyIds]);
  const availableList = useMemo(()=>onDutyList.filter(e=>!assignedSet.has(e.id)),[onDutyList,assignedSet]);

  const count    = onDutyList.length;
  const countOK  = count>=tMin && count<=tMax;

  const [rosterQ,   setRosterQ]   = useState("");
  const [certFilt,  setCertFilt]  = useState(null);
  const [unitFilt,  setUnitFilt]  = useState(null);
  const [resetConf, setResetConf] = useState(false);

  const filteredRoster = roster.filter(e=>{
    if(rosterQ&&!e.name.toLowerCase().includes(rosterQ.toLowerCase())) return false;
    if(certFilt&&!e.certs[certFilt]) return false;
    if(unitFilt&&e.unit!==unitFilt) return false;
    return true;
  });

  // Invisible 1x1 pixel to replace the native drag ghost image — loaded at module level
  function onDragStart(e, empId) {
    const emp=roster.find(r=>r.id===empId);
    if(emp?.absence) { e.preventDefault(); return; }
    dragEmpId.current = empId;
    e.dataTransfer.effectAllowed = "move";
    // Hide native ghost, show our animated stick figure instead
    e.dataTransfer.setDragImage(_blankDragImg, 0, 0);
    startGhost(emp.name);
  }
  function onSlotDragOver(e, slotId, slot) {
    e.preventDefault();
    const empId = dragEmpId.current;
    if(!empId) return;
    const emp = roster.find(r=>r.id===empId);
    if(!emp) return;
    if(slot.requiredCert && !meetsReq(emp, slot.requiredCert)) { e.dataTransfer.dropEffect="none"; return; }
    e.dataTransfer.dropEffect = "move";
    setDragOver(slotId);
  }
  function onSlotDrop(e, slotId, slot) {
    e.preventDefault();
    setDragOver(null);
    stopGhost();
    const empId = dragEmpId.current;
    if(!empId) return;
    const emp = roster.find(r=>r.id===empId);
    if(!emp || emp.absence) return;
    if(slot.requiredCert && !meetsReq(emp, slot.requiredCert)) return;
    const nextOnDuty = onDutyIds.includes(empId) ? onDutyIds : [...onDutyIds, empId];
    const nextAssign = {...assignments};
    Object.keys(nextAssign).forEach(k=>{ if(nextAssign[k]===empId) nextAssign[k]=null; });
    nextAssign[slotId] = empId;
    onChange({ ...dayState, onDuty:nextOnDuty, assignments:nextAssign });
    dragEmpId.current = null;
  }
  function onDragEnd() { dragEmpId.current=null; setDragOver(null); stopGhost(); }

  const [confirmPending, setConfirmPending] = useState(null);

  function requestRemoveFromDuty(emp) {
    if (!onDutyIds.includes(emp.id)) return;
    setConfirmPending({ type:"offduty", empId:emp.id, name:emp.name });
  }
  function requestClearSlot(slotId, empName) {
    setConfirmPending({ type:"slot", slotId, name:empName });
  }
  function confirmRemove() {
    if (!confirmPending) return;
    if (confirmPending.type === "offduty") {
      const nextA = {...assignments};
      Object.keys(nextA).forEach(k=>{ if(nextA[k]===confirmPending.empId) nextA[k]=null; });
      onChange({ ...dayState, onDuty:onDutyIds.filter(x=>x!==confirmPending.empId), assignments:nextA });
    } else {
      onChange({ ...dayState, onDuty:onDutyIds, assignments:{...assignments,[confirmPending.slotId]:null} });
    }
    setConfirmPending(null);
  }

  function toggleOnDuty(empId) {
    const emp = roster.find(r=>r.id===empId);
    if(emp?.absence) return;
    if(onDutyIds.includes(empId)) { requestRemoveFromDuty(emp); }
    else { onChange({ ...dayState, onDuty:[...onDutyIds,empId], assignments }); }
  }

  function updateNotes(val) {
    onChange({ ...dayState, notes: val });
  }

  function unitOK(unit) { return unit.slots.filter(sl=>assignments[sl.id]).length>=unit.minSlots; }

  const certCounts = useMemo(()=>{
    const c={}; CERT_DEFS.forEach(cd=>{c[cd.key]=onDutyList.filter(e=>e.certs[cd.key]).length;});
    return c;
  },[onDutyList]);

  const shiftUD = unitDef(shiftUnitKey);

  function doPrint() {
    const w=window.open("","_blank");
    let h=`<html><head><title>HHFD Staffing</title>
    <style>body{font-family:Arial,sans-serif;font-size:12px;margin:24px}
    h1{font-size:16px;margin:0 0 4px}h2{font-size:13px;margin:12px 0 4px;border-bottom:1px solid #ccc}
    h3{font-size:12px;margin:8px 0 3px}table{border-collapse:collapse;width:100%;margin-bottom:6px}
    td,th{border:1px solid #ddd;padding:4px 8px;text-align:left}th{background:#f0f0f0}
    .notes-box{border:1px solid #ccc;padding:8px 10px;border-radius:4px;margin-top:4px;white-space:pre-wrap;font-size:12px;line-height:1.5}
    .duty-item{padding:3px 0;border-bottom:1px solid #eee}
    </style></head><body>`;
    h+=`<h1>HHFD Daily Staffing</h1>`;
    h+=`<p style="margin:0 0 10px;font-size:12px">On Duty: ${count} ${shiftUD?"— "+shiftUD.label:""}</p>`;
    // Recurring duties section
    if (duties && duties.length > 0) {
      h+=`<h2>Recurring Duties</h2>`;
      duties.forEach(d=>{
        h+=`<div class="duty-item"><strong>${d.title}</strong>${d.assignedTo?` — ${d.assignedTo}`:""}</div>`;
      });
    }
    // Stations
    stations.forEach(st=>{
      h+=`<h2>${st.label}</h2>`;
      st.units.forEach(u=>{
        h+=`<h3>${u.label} ${unitOK(u)?"✓":"⚠"}</h3><table><tr><th>Position</th><th>Assigned</th></tr>`;
        u.slots.forEach(sl=>{ const emp=roster.find(e=>e.id===assignments[sl.id]); h+=`<tr><td>${sl.label}</td><td>${emp?emp.name:"—"}</td></tr>`; });
        h+="</table>";
      });
    });
    if(availableList.length) h+=`<h2>On Duty / Unassigned</h2><p>${availableList.map(e=>e.name).join(", ")}</p>`;
    // Notes section
    if (notes && notes.trim()) {
      h+=`<h2>Shift Notes</h2><div class="notes-box">${notes.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`;
    }
    h+="</body></html>";
    w.document.write(h); w.document.close(); w.print();
  }

  return (
    <div style={{ display:"grid", gridTemplateColumns:compact?"260px 1fr":"310px 1fr", gap:16, padding:compact?0:4 }}>
      {/* ── LEFT: Roster panel ── */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {/* Status hero card */}
        <div style={{ background: countOK
          ? `linear-gradient(135deg,${C.greenDim} 0%,#033d28 100%)`
          : `linear-gradient(135deg,${C.redDim} 0%,#3d0a18 100%)`,
          border:`2px solid ${countOK?C.greenBorder:C.redBorder}`,
          borderRadius:14, padding:"14px 16px",
          boxShadow: countOK ? C.staffedGlow : "none" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <div>
              <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
                <span style={{ fontSize:42, fontWeight:900, color:countOK?C.green:C.red, lineHeight:1,
                  textShadow:countOK?`0 0 20px ${C.green}50`:`0 0 20px ${C.red}50` }}>{count}</span>
                <span style={{ color:C.textMuted, fontSize:12, fontWeight:600 }}>on duty</span>
              </div>
              <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>Target: {tMin} – {tMax}</div>
            </div>
            <div style={{ textAlign:"right", display:"flex", flexDirection:"column", gap:5, alignItems:"flex-end" }}>
              <div style={{ fontSize:13, fontWeight:800, color:countOK?C.green:C.red,
                background:countOK?C.greenDim:C.redDim, border:`1px solid ${countOK?C.greenBorder:C.redBorder}`,
                borderRadius:8, padding:"4px 10px" }}>
                {countOK ? "✓ VALID" : "⚠ INVALID"}
              </div>
              {shiftUD && <UnitBadge unitKey={shiftUnitKey}/>}
            </div>
          </div>
          {count>0 && (
            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {CERT_DEFS.map(c=>(
                <span key={c.key} style={{ background:c.color+"20", color:c.color,
                  border:`1px solid ${c.color}40`, borderRadius:6, padding:"3px 8px",
                  fontSize:11, fontWeight:700 }}>
                  {c.label} {certCounts[c.key]}
                </span>
              ))}
            </div>
          )}
        </div>

        {/* Unassigned holding area */}
        {availableList.length>0 && (
          <div style={{ background:`linear-gradient(135deg,${C.amberDim},#241807)`,
            border:`1px solid ${C.amberBorder}`, borderRadius:12, padding:"11px 13px" }}>
            <div style={{ fontSize:11, fontWeight:800, color:C.amber, marginBottom:8, letterSpacing:.8 }}>
              ON DUTY — UNASSIGNED ({availableList.length})
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              {availableList.map(e=>{
                const ud=unitDef(e.unit);
                return (
                  <div key={e.id} draggable onDragStart={ev=>onDragStart(ev,e.id)} onDragEnd={onDragEnd}
                    style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 9px",
                      borderRadius:7, cursor:"grab", userSelect:"none",
                      background:ud?ud.bg:C.bg3, border:`1px solid ${ud?ud.border:C.border}`,
                      transition:"transform .1s" }}>
                    {ud && <div style={{ width:3, height:20, borderRadius:2, background:ud.color }}/>}
                    <span style={{ fontSize:12, fontWeight:600, color:ud?ud.text:C.text,
                      flex:1, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {e.name}
                    </span>
                    <span style={{ fontSize:10, color:C.textMuted }}>☰</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Full roster */}
        <div style={{ ...base.card, padding:13 }}>
          <div style={{ fontSize:11, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
            letterSpacing:1.2, marginBottom:9 }}>
            Roster <span style={{ color:C.textMuted, fontWeight:400 }}>— click ✓ or drag to board</span>
          </div>
          <input style={{ ...base.input, marginBottom:9 }} placeholder="Search name…"
            value={rosterQ} onChange={e=>setRosterQ(e.target.value)}/>
          <div style={{ fontSize:9, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
            letterSpacing:1, marginBottom:5 }}>Filter by Cert</div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:8 }}>
            <FilterPill label="All" active={!certFilt&&!unitFilt} color={C.textSub}
              onClick={()=>{setCertFilt(null);setUnitFilt(null);}}/>
            {CERT_DEFS.map(c=>(
              <FilterPill key={c.key} label={c.label} active={certFilt===c.key} color={c.color}
                onClick={()=>{setCertFilt(p=>p===c.key?null:c.key);setUnitFilt(null);}}/>
            ))}
          </div>
          <div style={{ fontSize:9, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
            letterSpacing:1, marginBottom:5 }}>Filter by Unit</div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:9 }}>
            {UNIT_DEFS.map(u=>(
              <FilterPill key={u.key} label={u.label} active={unitFilt===u.key} color={u.color}
                onClick={()=>{setUnitFilt(p=>p===u.key?null:u.key);setCertFilt(null);}}/>
            ))}
          </div>
          <div style={{ maxHeight:compact?220:310, overflowY:"auto", display:"flex", flexDirection:"column", gap:3 }}>
            {filteredRoster.map(emp=>{
              const onDuty   = onDutyIds.includes(emp.id);
              const assigned = assignedSet.has(emp.id);
              const absent   = !!emp.absence;
              const ud       = unitDef(emp.unit);
              return (
                <div key={emp.id}
                  draggable={!absent}
                  onDragStart={ev=>onDragStart(ev,emp.id)}
                  onDragEnd={onDragEnd}
                  onClick={()=>!absent&&toggleOnDuty(emp.id)}
                  style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 9px",
                    borderRadius:7, cursor:absent?"default":"pointer",
                    background: absent ? C.bg1 : onDuty ? (ud?ud.bg:C.greenDim) : C.bg1,
                    border:`1px solid ${absent?C.border:onDuty?(ud?ud.border:C.greenBorder):C.border}`,
                    opacity:absent?.4:1, transition:"background .12s,border .12s", userSelect:"none" }}>
                  {ud && !absent && <div style={{ width:3, height:24, borderRadius:2, background:ud.color }}/>}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, fontWeight:onDuty?700:400,
                      color:absent?C.textMuted:onDuty?(ud?ud.text:C.green):C.text,
                      whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                      {emp.name}
                    </div>
                    <div style={{ marginTop:3 }}>
                      {absent ? <AbsenceBadge absKey={emp.absence}/> : <CertChips certs={emp.certs}/>}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:4, alignItems:"center", flexShrink:0 }}>
                    {ud && !absent && <UnitBadge unitKey={emp.unit} small/>}
                    {!absent && (
                      <span style={{ fontSize:16, fontWeight:700,
                        color: onDuty ? (assigned?"#38bdf8":(ud?ud.text:C.green)) : C.textMuted,
                        lineHeight:1 }}>
                        {onDuty ? (assigned ? "📌" : "✓") : "+"}
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
            {filteredRoster.length===0 && (
              <div style={{ color:C.textMuted, fontSize:12, padding:"16px 0", textAlign:"center" }}>No results</div>
            )}
          </div>
        </div>

        {/* Action buttons */}
        {!compact && (
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={doPrint} variant="secondary" style={{ flex:1, justifyContent:"center" }}>🖨 Print</Btn>
            <Btn onClick={()=>setResetConf(true)} variant="danger" style={{ flex:1, justifyContent:"center" }}>↺ Reset</Btn>
          </div>
        )}
        {compact && <Btn onClick={()=>setResetConf(true)} variant="danger" size="sm">↺ Reset Day</Btn>}
      </div>

      {/* ── RIGHT: Apparatus + Notes ── */}
      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

        {/* Recurring duties display */}
        <RecurringDutiesPanel duties={duties}/>

        {/* Apparatus drop zones */}
        {stations.map(station=>{
          const allUnitsOK  = station.units.every(u=>unitOK(u));
          const someUnitsOK = station.units.some(u=>unitOK(u));
          return (
            <div key={station.id}
              className={allUnitsOK?"staffed-card":""}
              style={{ background: allUnitsOK
                ? `linear-gradient(135deg,${C.staffedBg} 0%,#033d28 100%)`
                : C.bg1,
                border:`1px solid ${allUnitsOK?C.staffedBorder:station.color+"50"}`,
                borderRadius:14, padding:16,
                boxShadow: allUnitsOK ? C.staffedGlow : `0 0 0 1px ${station.color}20` }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                <div style={{ width:5, height:26, borderRadius:3, background:station.color,
                  flexShrink:0, boxShadow:`0 0 8px ${station.color}60` }}/>
                <span style={{ fontWeight:900, fontSize:16, color:C.text, flex:1, letterSpacing:.2 }}>{station.label}</span>
                <span style={{ fontSize:11, fontWeight:800, padding:"4px 10px", borderRadius:8,
                  background: allUnitsOK ? C.greenDim : someUnitsOK ? C.amberDim : C.bg2,
                  color: allUnitsOK ? C.green : someUnitsOK ? C.amber : C.textMuted,
                  border:`1px solid ${allUnitsOK?C.greenBorder:someUnitsOK?C.amberBorder:C.border}` }}>
                  {allUnitsOK ? "✓ All Staffed" : someUnitsOK ? "Partial" : "Open"}
                </span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))", gap:10 }}>
                {station.units.map(unit=>{
                  const ok = unitOK(unit);
                  return (
                    <div key={unit.id}
                      style={{ background: ok ? C.staffedBg : C.bg0,
                        border:`1px solid ${ok?C.staffedBorder:C.border}`,
                        borderRadius:10, padding:12,
                        boxShadow: ok ? "0 0 12px #34d39918" : "none",
                        transition:"all .3s" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                        <span style={{ fontWeight:700, fontSize:12, color:ok?C.green:C.textSub }}>{unit.label}</span>
                        <span style={{ fontSize:10, fontWeight:800,
                          color:ok?C.green:C.textMuted,
                          background:ok?C.greenDim:C.bg2,
                          border:`1px solid ${ok?C.greenBorder:C.border}`,
                          borderRadius:6, padding:"2px 7px" }}>
                          {ok ? "✓ STAFFED" : "OPEN"}
                        </span>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                        {unit.slots.map(slot=>{
                          const empId   = assignments[slot.id];
                          const emp     = roster.find(e=>e.id===empId);
                          const ud      = emp ? unitDef(emp.unit) : null;
                          const cd      = slot.requiredCert ? certDef(slot.requiredCert) : null;
                          const hovering = dragOver===slot.id;
                          return (
                            <div key={slot.id}
                              onDragOver={ev=>onSlotDragOver(ev,slot.id,slot)}
                              onDragLeave={ev=>{if(!ev.currentTarget.contains(ev.relatedTarget))setDragOver(null);}}
                              onDrop={ev=>onSlotDrop(ev,slot.id,slot)}
                              style={{ display:"flex", alignItems:"center", gap:6 }}>
                              <div style={{ flex:1,
                                background: hovering ? C.bg4 : emp ? C.bg2 : C.bg1,
                                border:`2px ${hovering?"dashed":"solid"} ${hovering?C.accent:emp?C.borderHi:C.border}`,
                                borderRadius:8, padding:"7px 10px", minHeight:36,
                                display:"flex", alignItems:"center", justifyContent:"space-between",
                                transition:"all .12s",
                                boxShadow: hovering ? `0 0 0 3px ${C.accent}30,0 4px 12px ${C.accent}20` : emp ? "none" : "inset 0 1px 4px #00000030",
                                cursor: emp ? "default" : "copy" }}>
                                {emp ? (
                                  <div style={{ display:"flex", alignItems:"center", gap:6, minWidth:0 }}>
                                    {ud && <div style={{ width:3, height:22, borderRadius:2, background:ud.color, flexShrink:0 }}/>}
                                    <span style={{ fontSize:12, fontWeight:600, color:C.text,
                                      whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                                      {emp.name}
                                    </span>
                                    {ud && <UnitBadge unitKey={emp.unit} small/>}
                                  </div>
                                ) : (
                                  <span style={{ fontSize:11, color: hovering ? C.accent : C.textMuted,
                                    fontWeight: hovering ? 700 : 400 }}>
                                    {hovering ? "📥 Drop here" : (
                                      <>
                                        {slot.label}
                                        {cd && <span style={{ color:cd.color, marginLeft:5, fontSize:10, fontWeight:700 }}>[{cd.label}]</span>}
                                      </>
                                    )}
                                  </span>
                                )}
                              </div>
                              {emp && (
                                <Btn onClick={()=>requestClearSlot(slot.id, emp.name)} variant="danger" size="sm"
                                  style={{ padding:"5px 9px" }}>✕</Btn>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* Notes panel — always at the bottom of the right column */}
        <NotesPanel notes={notes} onChange={updateNotes}/>

      </div>

      {/* Removal confirmation */}
      {confirmPending && (
        <div style={{ position:"fixed", inset:0, zIndex:490,
          display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={()=>setConfirmPending(null)}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:C.bg2, border:`1px solid ${C.redBorder}`,
              borderRadius:12, padding:"16px 20px", maxWidth:320, width:"90%",
              boxShadow:"0 8px 40px #00000090, 0 0 0 1px #7f1d1d",
              display:"flex", flexDirection:"column", gap:12 }}>
            <div>
              <div style={{ fontSize:13, fontWeight:800, color:C.red, marginBottom:4 }}>
                {confirmPending.type==="offduty" ? "Remove from duty?" : "Remove from slot?"}
              </div>
              <div style={{ fontSize:12, color:C.textSub, lineHeight:1.5 }}>
                <b style={{ color:C.text }}>{confirmPending.name}</b>
                {confirmPending.type==="offduty"
                  ? " will be removed from duty and unassigned from all trucks."
                  : " will be removed from this slot but stays on duty."}
              </div>
            </div>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn onClick={()=>setConfirmPending(null)} variant="ghost" size="sm">Keep</Btn>
              <Btn onClick={confirmRemove} variant="danger" size="sm">Yes, Remove</Btn>
            </div>
          </div>
        </div>
      )}

      {resetConf && (
        <Confirm msg="Clear all on-duty selections and assignments for this day?"
          yesLabel="Reset Day" yesVariant="danger"
          onYes={()=>{ onChange({...emptyDay()}); setResetConf(false); }}
          onNo={()=>setResetConf(false)}/>
      )}
    </div>
  );
}

// PLANNER TAB
// ════════════════════════════════════════════════════════════════════════════
function PlannerTab({ roster, stations, plannerDays, setPlannerDays, anchor, setAnchor, duties, thresholds }) {
  const now = new Date();
  const [viewYear,  setViewYear]  = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const [selected,  setSelected]  = useState(null);
  const [copyConf,  setCopyConf]  = useState(null);
  const [copyNoSrc, setCopyNoSrc] = useState(false);
  const [resetConf, setResetConf] = useState(null);
  const [editAnchor,setEditAnchor]= useState(false);

  const calDays = useMemo(()=>getMonthShifts(viewYear,viewMonth,anchor),[viewYear,viewMonth,anchor]);

  function getDayState(date) {
    return plannerDays.find(d=>d.date===date) || {date,...emptyDay()};
  }
  function updateDay(date, state) {
    const exists = plannerDays.find(d=>d.date===date);
    const next = exists ? plannerDays.map(d=>d.date===date?{...state,date}:d) : [...plannerDays,{...state,date}];
    setPlannerDays(next);
  }
  function resetDay(date) {
    setPlannerDays(plannerDays.filter(d=>d.date!==date));
    setResetConf(null); setSelected(null);
  }
  function copyToday(date) {
    const src = plannerDays.filter(d=>d.date<date&&d.onDuty.length>0).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(!src){ setCopyConf(null); setCopyNoSrc(true); return; }
    updateDay(date,{onDuty:[...src.onDuty],assignments:{...src.assignments},notes:src.notes||""});
    setCopyConf(null);
  }

  const prevMonth=()=>{ if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); };
  const nextMonth=()=>{ if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); };
  const monthName=new Date(viewYear,viewMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});

  const selectedDayState = selected ? getDayState(selected) : null;
  const selectedUnit     = selected ? getShiftUnit(anchor, selected) : null;
  const tMin = thresholds?.min ?? 16;
  const tMax = thresholds?.max ?? 20;

  const firstDow   = new Date(viewYear,viewMonth,1).getDay();
  const totalCells = Math.ceil((firstDow + calDays.length)/7)*7;
  const cells = [];
  for(let i=0;i<totalCells;i++){
    const dayIdx=i-firstDow;
    cells.push(dayIdx>=0&&dayIdx<calDays.length ? calDays[dayIdx] : null);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"calc(100vh - 62px)"}}>
      <div style={{padding:16,overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <Btn onClick={prevMonth} variant="secondary" size="sm">‹</Btn>
          <span style={{fontWeight:800,fontSize:16,flex:1,textAlign:"center"}}>{monthName}</span>
          <Btn onClick={nextMonth} variant="secondary" size="sm">›</Btn>
          <Btn onClick={()=>setEditAnchor(true)} variant="ghost" size="sm">⚙ Rotation</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.textMuted,padding:"4px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={i}/>;
            const ud=unitDef(day.unit);
            const ds=getDayState(day.date);
            const hasData=ds.onDuty.length>0;
            const countOK=ds.onDuty.length>=tMin&&ds.onDuty.length<=tMax;
            const hasNotes=!!(ds.notes&&ds.notes.trim());
            return (
              <div key={day.date} onClick={()=>setSelected(day.date)}
                style={{borderRadius:10,padding:"10px 8px",cursor:"pointer",minHeight:80,
                  background:ud?.bg||C.bg2,
                  border:`2px solid ${day.isToday?C.accent:(ud?.border||C.border)}`,
                  boxShadow:day.isToday?`0 0 0 2px ${C.accent}40`:"none",
                  transition:"all .12s",display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                <div style={{fontSize:13,fontWeight:800,color:day.isToday?C.accent:(ud?ud.text:C.textMuted)}}>{day.day}</div>
                <span style={{fontSize:10,fontWeight:800,color:ud?.text,background:ud?.color+"30",
                  border:`1px solid ${ud?.border}`,borderRadius:4,padding:"2px 6px"}}>{ud?.label}</span>
                {hasData
                  ? <span style={{fontSize:10,fontWeight:700,color:countOK?C.green:C.amber}}>{ds.onDuty.length} on duty</span>
                  : <span style={{fontSize:10,color:C.textMuted}}>tap to plan</span>}
                {hasNotes && <span style={{fontSize:9,color:C.accentHov}}>📝</span>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:14,marginTop:16,flexWrap:"wrap"}}>
          {UNIT_DEFS.map(u=>(
            <span key={u.key} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:u.text}}>
              <span style={{width:10,height:10,borderRadius:2,background:u.color,display:"inline-block"}}/>
              {u.label}
            </span>
          ))}
          <span style={{fontSize:11,color:C.textMuted}}>📝 = has notes · Click any day to open full staffing board</span>
        </div>
      </div>

      {/* Full-screen day modal */}
      {selected && (
        <div style={{position:"fixed",inset:0,background:"rgba(3,9,18,.92)",zIndex:450,
          display:"flex",flexDirection:"column",backdropFilter:"blur(4px)"}}>
          <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,
            padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,
            boxShadow:"0 2px 16px #00000060"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:16,color:C.text}}>{fmtDateLong(selected)}</div>
              <div style={{fontSize:11,color:unitDef(selectedUnit)?.text,fontWeight:700,marginTop:2}}>
                {unitDef(selectedUnit)?.label}
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Btn onClick={()=>setCopyConf(selected)} variant="secondary" size="sm">📋 Copy Previous</Btn>
              <Btn onClick={()=>setResetConf(selected)} variant="danger" size="sm">↺ Reset</Btn>
              <Btn onClick={()=>setSelected(null)} variant="ghost" size="sm" style={{fontSize:18,padding:"4px 10px"}}>✕</Btn>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16}}>
            <DayBoard roster={roster} stations={stations} dayState={selectedDayState}
              onChange={state=>updateDay(selected,state)} shiftUnitKey={selectedUnit}
              compact duties={duties} thresholds={thresholds}/>
          </div>
        </div>
      )}

      {editAnchor&&<RotationModal anchor={anchor} onSave={a=>{setAnchor(a);setEditAnchor(false);}} onClose={()=>setEditAnchor(false)}/>}
      {copyConf&&(
        <Confirm msg="Copy the most recently planned shift's roster and assignments to this day?"
          yesLabel="Copy" yesVariant="primary" onYes={()=>copyToday(copyConf)} onNo={()=>setCopyConf(null)}/>
      )}
      {copyNoSrc&&(
        <Confirm msg="No previously planned shift found to copy from." yesLabel="OK" yesVariant="secondary"
          onYes={()=>setCopyNoSrc(false)} onNo={()=>setCopyNoSrc(false)}/>
      )}
      {resetConf&&(
        <Confirm msg={`Reset all staffing for ${fmtDateShort(resetConf)}?`} yesLabel="Reset"
          onYes={()=>resetDay(resetConf)} onNo={()=>setResetConf(null)}/>
      )}
    </div>
  );
}

function RotationModal({ anchor, onSave, onClose }) {
  const [date, setDate] = useState(anchor.date);
  const [unit, setUnit] = useState(anchor.unit);
  return (
    <Modal title="⚙ Rotation Settings" onClose={onClose} width={380}>
      <p style={{color:C.textSub,fontSize:13,marginTop:0,lineHeight:1.6}}>
        Set a known reference point: pick a date and which unit was on duty that day at 0730.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <label style={base.lbl}>Reference Date</label>
          <input type="date" style={base.input} value={date} onChange={e=>setDate(e.target.value)}/>
        </div>
        <div>
          <label style={base.lbl}>Unit On Duty That Day</label>
          <div style={{display:"flex",gap:8}}>
            {UNIT_DEFS.map(u=>(
              <button key={u.key} onClick={()=>setUnit(u.key)}
                style={{flex:1,padding:"10px 8px",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:13,
                  background:unit===u.key?u.bg:"transparent",color:unit===u.key?u.text:u.color,
                  border:`2px solid ${unit===u.key?u.color:C.border}`,transition:"all .12s",
                  boxShadow:unit===u.key?`0 0 12px ${u.color}40`:"none"}}>
                {u.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn onClick={onClose} variant="ghost">Cancel</Btn>
          <Btn onClick={()=>onSave({date,unit})} variant="primary">Save Rotation</Btn>
        </div>
      </div>
    </Modal>
  );
}

// ROSTER TAB
// ════════════════════════════════════════════════════════════════════════════
function RosterTab({ roster, setRoster }) {
  const [q,        setQ]        = useState("");
  const [certFilt, setCertFilt] = useState(null);
  const [unitFilt, setUnitFilt] = useState(null);
  const [absFilt,  setAbsFilt]  = useState(null);
  const [editing,  setEditing]  = useState(null);
  const [del,      setDel]      = useState(null);

  const filtered = roster.filter(e=>{
    if(q&&!e.name.toLowerCase().includes(q.toLowerCase())) return false;
    if(certFilt&&!e.certs[certFilt]) return false;
    if(unitFilt&&e.unit!==unitFilt) return false;
    if(absFilt==="absent"&&!e.absence) return false;
    if(absFilt==="available"&&e.absence) return false;
    return true;
  });

  function saveEmp(emp) {
    const next=emp.id&&roster.find(e=>e.id===emp.id)
      ?roster.map(e=>e.id===emp.id?emp:e)
      :[...roster,{...emp,id:uid()}].sort((a,b)=>a.name.localeCompare(b.name));
    setRoster(next); setEditing(null);
  }
  function delEmp(id) { setRoster(roster.filter(e=>e.id!==id)); setDel(null); }
  function quickAbsence(emp, absKey) {
    setRoster(roster.map(e=>e.id===emp.id?{...e,absence:e.absence===absKey?null:absKey}:e));
  }

  const absentCount=roster.filter(e=>e.absence).length;

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:14}}>
        <input style={{...base.input,width:210}} placeholder="Search roster…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap",alignItems:"center"}}>
          <FilterPill label={`All (${roster.length})`}           active={!certFilt&&!unitFilt&&!absFilt} color={C.textSub}   onClick={()=>{setCertFilt(null);setUnitFilt(null);setAbsFilt(null);}}/>
          <FilterPill label={`Available (${roster.length-absentCount})`} active={absFilt==="available"} color={C.green}   onClick={()=>{setAbsFilt(p=>p==="available"?null:"available");setCertFilt(null);setUnitFilt(null);}}/>
          <FilterPill label={`Absent (${absentCount})`}         active={absFilt==="absent"}    color={C.red}    onClick={()=>{setAbsFilt(p=>p==="absent"?null:"absent");setCertFilt(null);setUnitFilt(null);}}/>
          {CERT_DEFS.map(c=><FilterPill key={c.key} label={c.label} active={certFilt===c.key} color={c.color} onClick={()=>{setCertFilt(p=>p===c.key?null:c.key);setUnitFilt(null);setAbsFilt(null);}}/>)}
          {UNIT_DEFS.map(u=><FilterPill key={u.key} label={u.label} active={unitFilt===u.key} color={u.color} onClick={()=>{setUnitFilt(p=>p===u.key?null:u.key);setCertFilt(null);setAbsFilt(null);}}/>)}
        </div>
        <Btn onClick={()=>setEditing({id:"",name:"",certs:{officer:false,operator:false,tillerman:false,paramedic:false,emt:false},unit:null,absence:null})} variant="primary">+ Add</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:8}}>
        {filtered.map(emp=>{
          const ud=unitDef(emp.unit);
          const ad=absenceDef(emp.absence);
          return (
            <div key={emp.id} style={{...base.card,display:"flex",gap:8,padding:"10px 13px",
              borderColor:ad?ad.color+"50":ud?ud.border:C.border, opacity:ad?.75:1}}>
              {ud&&!ad&&<div style={{width:4,height:"100%",minHeight:38,borderRadius:2,background:ud.color}}/>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{emp.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,flexWrap:"wrap"}}>
                  {ad?<AbsenceBadge absKey={emp.absence}/>:<CertChips certs={emp.certs}/>}
                  {ud&&!ad&&<UnitBadge unitKey={emp.unit} small/>}
                </div>
                <div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>
                  {ABSENCE_DEFS.map(a=>(
                    <button key={a.key} onClick={()=>quickAbsence(emp,a.key)}
                      style={{background:emp.absence===a.key?a.color:C.bg1,color:emp.absence===a.key?"#fff":a.color,
                        border:`1px solid ${a.color}50`,borderRadius:4,padding:"2px 6px",fontSize:10,cursor:"pointer",
                        transition:"all .1s"}}>
                      {a.icon} {a.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:5,flexShrink:0,alignSelf:"flex-start"}}>
                <Btn onClick={()=>setEditing({...emp,certs:{...emp.certs}})} variant="secondary" size="sm">✎</Btn>
                <Btn onClick={()=>setDel(emp)} variant="danger" size="sm">✕</Btn>
              </div>

          );

// STATIONS TAB
// ════════════════════════════════════════════════════════════════════════════
function StationsTab({ stations, setStations }) {
  const [editSt,   setEditSt]   = useState(null);
  const [editUnit, setEditUnit] = useState(null);
  const [confirm,  setConfirm]  = useState(null);

  function saveSt(st) {
    const next=stations.find(s=>s.id===st.id)?stations.map(s=>s.id===st.id?st:s):[...stations,st];
    setStations(next); setEditSt(null);
  }
  function delSt(id) { setStations(stations.filter(s=>s.id!==id)); setConfirm(null); }
  function saveUnit(stId,unit) {
    const next=stations.map(s=>{
      if(s.id!==stId) return s;
      return {...s,units:s.units.find(u=>u.id===unit.id)?s.units.map(u=>u.id===unit.id?unit:u):[...s.units,unit]};
    });
    setStations(next); setEditUnit(null);
  }
  function delUnit(stId,uid2) {
    setStations(stations.map(s=>s.id!==stId?s:{...s,units:s.units.filter(u=>u.id!==uid2)}));
    setConfirm(null);
  }

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <Btn onClick={()=>setEditSt({id:uid(),label:"",color:"#6366f1",units:[]})} variant="primary">+ Add Station</Btn>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {stations.map(st=>(
          <div key={st.id} style={{...base.card,borderColor:st.color+"60"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:4,height:22,borderRadius:2,background:st.color,flexShrink:0}}/>
              <span style={{fontWeight:800,fontSize:15,flex:1}}>{st.label}</span>
              <Btn onClick={()=>setEditSt({...st,units:[...st.units]})} variant="secondary" size="sm">✎ Edit</Btn>
              <Btn onClick={()=>setConfirm({type:"station",id:st.id,label:st.label})} variant="danger" size="sm">✕</Btn>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8}}>
              {st.units.map(unit=>(
                <div key={unit.id} style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:8,padding:10}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontWeight:700,fontSize:12}}>{unit.label}</span>
                    <div style={{display:"flex",gap:5}}>
                      <Btn onClick={()=>setEditUnit({stId:st.id,unit:{...unit,slots:unit.slots.map(s=>({...s}))}})} variant="secondary" size="sm">✎</Btn>
                      <Btn onClick={()=>setConfirm({type:"unit",stId:st.id,unitId:unit.id,label:unit.label})} variant="danger" size="sm">✕</Btn>
                    </div>
                  </div>
                  <div style={{fontSize:10,color:C.textMuted,marginBottom:6}}>Min staffing: {unit.minSlots}</div>
                  {unit.slots.map(sl=>(
                    <div key={sl.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11,color:C.textSub,padding:"2px 0"}}>
                      <span>{sl.label}</span>
                      {sl.requiredCert&&<span style={{background:certDef(sl.requiredCert)?.color+"20",color:certDef(sl.requiredCert)?.color,borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>{sl.requiredCert}</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{marginTop:10}}>
              <Btn onClick={()=>setEditUnit({stId:st.id,unit:{id:uid(),label:"",minSlots:1,slots:[]}})} variant="secondary" size="sm">+ Add Apparatus</Btn>
            </div>
          </div>
        ))}
      </div>
      {editSt&&<StModal st={editSt} onSave={saveSt} onClose={()=>setEditSt(null)}/>}
      {editUnit&&<UnitModal stId={editUnit.stId} unit={editUnit.unit} onSave={saveUnit} onClose={()=>setEditUnit(null)}/>}
      {confirm?.type==="station"&&<Confirm msg={`Delete "${confirm.label}" and all its apparatus?`} onYes={()=>delSt(confirm.id)} onNo={()=>setConfirm(null)}/>}
      {confirm?.type==="unit"&&<Confirm msg={`Delete "${confirm.label}"?`} onYes={()=>delUnit(confirm.stId,confirm.unitId)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
}

function UnitModal({ stId, unit, onSave, onClose }) {
  const [label,setLabel]=useState(unit.label);
  const [minS, setMin]  =useState(unit.minSlots??1);
  const [slots,setSlots]=useState(unit.slots.map(s=>({...s})));
  function addSlot() { setSlots(p=>[...p,{id:uid(),label:"",requiredCert:null}]); }
  function remSlot(id) { setSlots(p=>p.filter(s=>s.id!==id)); }
  function updSlot(id,f,v) { setSlots(p=>p.map(s=>s.id===id?{...s,[f]:v||null}:s)); }
  function submit() { if(!label.trim())return; onSave(stId,{...unit,label:label.trim(),minSlots:Number(minS),slots}); }
  return (
    <Modal title={unit.label?"Edit: "+unit.label:"New Apparatus"} onClose={onClose} width={500}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <label style={base.lbl}>Unit Name</label>
            <input style={base.input} value={label} onChange={e=>setLabel(e.target.value)} placeholder="Engine 22"/>
          </div>
          <div style={{width:110}}>
            <label style={base.lbl}>Min to Staff</label>
            <input style={base.input} type="number" min={0} max={20} value={minS} onChange={e=>setMin(e.target.value)}/>

        </div>
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <label style={base.lbl}>Positions</label>
            <Btn onClick={addSlot} variant="secondary" size="sm">+ Add Position</Btn>
          </div>
          {slots.length===0&&<div style={{fontSize:12,color:C.textMuted,padding:"4px 0"}}>No positions yet.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {slots.map((sl)=>(
              <div key={sl.id} style={{display:"flex",gap:7,alignItems:"center"}}>
                <input style={{...base.input,flex:1}} value={sl.label} onChange={e=>updSlot(sl.id,"label",e.target.value)} placeholder="Position label"/>
                <select style={{...base.input,width:130}} value={sl.requiredCert||""} onChange={e=>updSlot(sl.id,"requiredCert",e.target.value)}>
                  <option value="">Any</option>
                  {CERT_DEFS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
                <Btn onClick={()=>remSlot(sl.id)} variant="danger" size="sm" style={{padding:"5px 9px"}}>✕</Btn>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn onClick={onClose} variant="ghost">Cancel</Btn>
          <Btn onClick={submit} variant="primary" disabled={!label.trim()}>Save</Btn>
        </div>
      </div>
    </Modal>
  );
}

// SETTINGS TAB — thresholds + recurring duties
// ════════════════════════════════════════════════════════════════════════════
function SettingsTab({ thresholds, setThresholds, duties, setDuties }) {
  const [tMin, setTMin] = useState(String(thresholds.min));
  const [tMax, setTMax] = useState(String(thresholds.max));
  const [saved, setSaved] = useState(false);

  // Duties editing
  const [editDuty,  setEditDuty]  = useState(null); // { id, title, assignedTo } or new
  const [delDuty,   setDelDuty]   = useState(null);

  function saveThresholds() {
    const mn = parseInt(tMin,10), mx = parseInt(tMax,10);
    if(isNaN(mn)||isNaN(mx)||mn<1||mx<mn) return;
    setThresholds({ min:mn, max:mx });
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  function saveDuty(duty) {
    if (!duty.title.trim()) return;
    const next = duty.id && duties.find(d=>d.id===duty.id)
      ? duties.map(d=>d.id===duty.id?duty:d)
      : [...duties, {...duty, id:uid()}];
    setDuties(next);
    setEditDuty(null);
  }

  function deleteDuty(id) {
    setDuties(duties.filter(d=>d.id!==id));
    setDelDuty(null);
  }

  function moveDuty(id, dir) {
    const idx = duties.findIndex(d=>d.id===id);
    if(idx<0) return;
    const next = [...duties];
    const swap = idx+dir;
    if(swap<0||swap>=next.length) return;
    [next[idx],next[swap]] = [next[swap],next[idx]];
    setDuties(next);
  }

  return (
    <div style={{padding:14,maxWidth:700}}>

      {/* ── Staffing Thresholds ── */}
      <div style={{...base.card,marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>
          📊 Staffing Thresholds
        </div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:16,lineHeight:1.6}}>
          The "valid" range shown on the Today and Planner boards. Default is 16–20.
        </div>
        <div style={{display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div>
            <label style={base.lbl}>Minimum Staffing</label>
            <input style={{...base.input,width:100}} type="number" min={1} max={50} value={tMin}
              onChange={e=>{setTMin(e.target.value);setSaved(false);}}/>
          </div>
          <div>
            <label style={base.lbl}>Maximum Staffing</label>
            <input style={{...base.input,width:100}} type="number" min={1} max={99} value={tMax}
              onChange={e=>{setTMax(e.target.value);setSaved(false);}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Btn onClick={saveThresholds} variant="primary">Save Thresholds</Btn>
            {saved && <span style={{color:C.green,fontSize:12,fontWeight:700}}>✓ Saved</span>}
          </div>
        </div>
        {/* Preview badge */}
        <div style={{marginTop:14,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:12,color:C.textMuted}}>Preview:</span>
          <span style={{background:C.greenDim,color:C.green,border:`1px solid ${C.greenBorder}`,
            borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700}}>
            ✓ VALID — {tMin}–{tMax} on duty
          </span>
        </div>
      </div>

      {/* ── Recurring Duties ── */}
      <div style={{...base.card}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text}}>🔁 Recurring Duties</div>
          <Btn onClick={()=>setEditDuty({id:"",title:"",assignedTo:""})} variant="primary" size="sm">+ Add Duty</Btn>
        </div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:16,lineHeight:1.6}}>
          These duties auto-appear on every shift board and print on the staffing sheet.
          Use them for standing assignments, weekly tasks, or recurring reminders.
        </div>

        {duties.length===0 && (
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,
            padding:"20px 0",textAlign:"center",color:C.textMuted,fontSize:13}}>
            No recurring duties yet. Add one above.
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {duties.map((d,i)=>(
            <div key={d.id} style={{display:"flex",gap:10,alignItems:"center",
              background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px"}}>
              {/* Reorder controls */}
              <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                <button onClick={()=>moveDuty(d.id,-1)} disabled={i===0}
                  style={{background:"none",border:"none",color:i===0?C.textMuted:C.textSub,cursor:i===0?"default":"pointer",
                    fontSize:12,padding:"0 2px",lineHeight:1}}>▲</button>
                <button onClick={()=>moveDuty(d.id,1)} disabled={i===duties.length-1}
                  style={{background:"none",border:"none",color:i===duties.length-1?C.textMuted:C.textSub,
                    cursor:i===duties.length-1?"default":"pointer",fontSize:12,padding:"0 2px",lineHeight:1}}>▼</button>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>{d.title}</div>
                {d.assignedTo && (
                  <div style={{fontSize:11,color:C.textSub,marginTop:2}}>{d.assignedTo}</div>
                )}
              </div>
              <Btn onClick={()=>setEditDuty({...d})} variant="secondary" size="sm">✎</Btn>
              <Btn onClick={()=>setDelDuty(d)} variant="danger" size="sm">✕</Btn>
            </div>
          ))}
        </div>
      </div>

      {/* Duty editor modal */}
      {editDuty && (
        <Modal title={editDuty.id?"Edit Duty":"Add Recurring Duty"} onClose={()=>setEditDuty(null)} width={420}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div>
              <label style={base.lbl}>Duty Title</label>
              <input style={base.input} value={editDuty.title}
                onChange={e=>setEditDuty(p=>({...p,title:e.target.value}))}
                placeholder="e.g. Hose testing — Station 22"/>
            </div>
            <div>
              <label style={base.lbl}>Assigned To / Notes (optional)</label>
              <input style={base.input} value={editDuty.assignedTo}
                onChange={e=>setEditDuty(p=>({...p,assignedTo:e.target.value}))}
                placeholder="e.g. Engine 22 crew, or leave blank"/>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn onClick={()=>setEditDuty(null)} variant="ghost">Cancel</Btn>
              <Btn onClick={()=>saveDuty(editDuty)} variant="primary" disabled={!editDuty.title.trim()}>
                {editDuty.id?"Save Changes":"Add Duty"}
              </Btn>
            </div>
          </div>
        </Modal>
      )}

      {delDuty && (
        <Confirm msg={`Remove "${delDuty.title}" from recurring duties?`}
          yesLabel="Remove" yesVariant="danger"
          onYes={()=>deleteDuty(delDuty.id)} onNo={()=>setDelDuty(null)}/>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [activeUnit, setActiveUnit] = useState(()=>load("hhfd_active_unit", null));
  return (
    <div>
      <GlobalStyles/>
      {!activeUnit
        ? <UnitSelector onSelect={u=>{ save("hhfd_active_unit",u); setActiveUnit(u); }}/>
        : <AppShell key={activeUnit} unitKey={activeUnit}
            onSwitchUnit={()=>{ save("hhfd_active_unit",null); setActiveUnit(null); }}/>
      }
    </div>
  );
}

function AppShell({ unitKey, onSwitchUnit }) {
  const K  = (k) => `${k}_u${unitKey}`;
  const ud = unitDef(unitKey);

  const [roster,      setRoster]      = useState(()=>load(K("hhfd_roster"),      DEFAULT_ROSTER));
  const [stations,    setStations]    = useState(()=>load(K("hhfd_stations"),    DEFAULT_STATIONS));
  const [todayState,  setTodayState]  = useState(()=>load(K("hhfd_today"),       emptyDay()));
  const [plannerDays, setPlannerDays] = useState(()=>load(K("hhfd_planner"),     []));
  const [anchor,      setAnchor]      = useState(()=>load(K("hhfd_anchor"),      getDefaultAnchor()));
  const [thresholds,  setThresholds]  = useState(()=>load(K("hhfd_thresholds"),  DEFAULT_THRESHOLDS));
  const [duties,      setDuties]      = useState(()=>load(K("hhfd_duties"),      DEFAULT_DUTIES));
  const [tab,         setTab]         = useState("today");
  const [confirmSwitch, setConfirmSwitch] = useState(false);

  function handleTodayChange(state)   { setTodayState(state);    save(K("hhfd_today"),      state); }
  function handleRosterChange(r)      { setRoster(r);            save(K("hhfd_roster"),     r); }
  function handleStationsChange(s)    { setStations(s);          save(K("hhfd_stations"),   s); }
  function handleAnchorChange(a)      { setAnchor(a);            save(K("hhfd_anchor"),     a); }
  function handlePlannerChange(p)     { setPlannerDays(p);       save(K("hhfd_planner"),    p); }
  function handleThresholdsChange(t)  { setThresholds(t);        save(K("hhfd_thresholds"), t); }
  function handleDutiesChange(d)      { setDuties(d);            save(K("hhfd_duties"),     d); }

  const TABS = [
    { id:"today",    label:"🗓 Today"     },
    { id:"planner",  label:"📅 Planner"   },
    { id:"roster",   label:"👥 Roster"    },
    { id:"stations", label:"🚒 Apparatus" },
    { id:"settings", label:"⚙ Settings"  },
  ];

  return (
    <div style={base.app}>
      <div style={base.hdr}>
        <span style={base.logo}>HHFD</span>
        <nav style={{ display:"flex", gap:6, flex:1, overflowX:"auto" }}>
          {TABS.map(t=>{
            const active = tab===t.id;
            return (
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background: active ? `linear-gradient(135deg,#f97316,#ea580c)` : C.bg2,
                color: active ? "#fff" : C.textSub,
                border: `1px solid ${active ? "#fb923c" : C.border}`,
                borderRadius: 9, padding:"8px 16px", cursor:"pointer",
                fontSize:13, fontWeight:800, letterSpacing:.3, transition:"all .15s",
                boxShadow: active
                  ? "0 4px 16px #f9731650, inset 0 1px 0 #ffffff30"
                  : "0 2px 6px #00000050, inset 0 1px 0 #ffffff08",
                transform: active ? "translateY(-1px)" : "translateY(0)",
                whiteSpace:"nowrap", flexShrink:0,
              }}>{t.label}</button>
            );
          })}
        </nav>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
          {ud && (
            <span style={{ background:ud.bg, color:ud.text, border:`1px solid ${ud.color}`,
              borderRadius:8, padding:"5px 12px", fontSize:12, fontWeight:800,
              letterSpacing:.5, boxShadow:`0 0 10px ${ud.color}30` }}>
              {ud.label}
            </span>
          )}
          <button onClick={()=>setConfirmSwitch(true)}
            style={{ background:C.bg2, color:C.textMuted, border:`1px solid ${C.border}`,
              borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:700,
              cursor:"pointer", letterSpacing:.3 }}>
            Switch Unit
          </button>
        </div>
      </div>

      <div style={{ display:tab==="today"    ?"block":"none" }}>
        <TodayTab roster={roster} stations={stations} dayState={todayState}
          onChange={handleTodayChange} anchor={anchor} duties={duties} thresholds={thresholds}/>
      </div>
      <div style={{ display:tab==="planner"  ?"block":"none" }}>
        <PlannerTab roster={roster} stations={stations}
          plannerDays={plannerDays} setPlannerDays={handlePlannerChange}
          anchor={anchor} setAnchor={handleAnchorChange}
          duties={duties} thresholds={thresholds}/>
      </div>
      <div style={{ display:tab==="roster"   ?"block":"none" }}>
        <RosterTab roster={roster} setRoster={handleRosterChange}/>
      </div>
      <div style={{ display:tab==="stations" ?"block":"none" }}>
        <StationsTab stations={stations} setStations={handleStationsChange}/>
      </div>
      <div style={{ display:tab==="settings" ?"block":"none" }}>
        <SettingsTab thresholds={thresholds} setThresholds={handleThresholdsChange}
          duties={duties} setDuties={handleDutiesChange}/>
      </div>

      {confirmSwitch && (
        <Modal title="Switch Unit?" onClose={()=>setConfirmSwitch(false)} width={380}>
          <p style={{ margin:"0 0 6px", color:C.textSub, lineHeight:1.6, fontSize:14 }}>
            Your work is saved. Switching units takes you back to the unit selector —
            {ud && <span style={{ color:ud.text, fontWeight:700 }}> {ud.label}'s </span>}
            data stays exactly as you left it.
          </p>
          <p style={{ margin:"0 0 18px", color:C.textMuted, fontSize:12 }}>
            Come back any time and pick {ud?.label} again to pick up where you left off.
          </p>
          <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
            <Btn onClick={()=>setConfirmSwitch(false)} variant="ghost">Stay Here</Btn>
            <Btn onClick={onSwitchUnit} variant="primary">Go to Unit Selector</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
