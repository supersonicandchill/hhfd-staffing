// Crew Rotations: each rotation tracks one position at one apparatus across shifts
// { id, name, color, stationId, unitId, shiftDays, anchorDate, anchorUnit, crew: [{ id, label, empId }] }
// shiftDays: how many calendar days per shift cycle (default 3 for 24/24/24)
// anchorDate + anchorUnit: tie the rotation to the shift anchor so crew[0] is on duty
// when anchorUnit is working on anchorDate. Crew rotates every shiftDays calendar days.
const DEFAULT_ROTATIONS = [];

function getCrewIndexForDate(rotation, targetDate, shiftAnchor) {
  // shiftAnchor = { date, unit } from the app's anchor state
  // We want to find which crew member is "up" on targetDate.
  // Step 1: figure out how many shifts have elapsed since rotation.anchorDate
  if (!rotation.crew || !rotation.crew.length) return null;
  if (!rotation.anchorDate) return null;
  const shiftDays = rotation.shiftDays || 3;
  const diff = daysBetween(rotation.anchorDate, targetDate);
  if (isNaN(diff)) return null;
  // How many full shift cycles elapsed? Each crew member serves shiftDays days
  const totalSlot = Math.floor(diff / shiftDays);
  // Modulo crew length, handle negatives
  const crewCount = rotation.crew.length;
  const idx = ((totalSlot % crewCount) + crewCount) % crewCount;
  return idx;
}
function getCrewMemberForDate(rotation, targetDate, shiftAnchor) {
  const idx = getCrewIndexForDate(rotation, targetDate, shiftAnchor);
  if (idx === null || idx === undefined) return null;
  return rotation.crew[idx] || null;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
let _c = Date.now();
function uid() { return "u"+(++_c).toString(36); }
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function daysBetween(a, b) {
  const da=new Date(a+"T12:00:00"), db=new Date(b+"T12:00:00");
  return Math.round((db-da)/(1000*60*60*24));
}
function getShiftUnit(anchor, targetDate) {
  const unitOrder = ["1","2","3"];
  const anchorIdx = unitOrder.indexOf(anchor.unit);
  const diff = daysBetween(anchor.date, targetDate);
  const unitIdx = ((anchorIdx + diff) % 3 + 3) % 3;
  return unitOrder[unitIdx];
}
function getMonthShifts(year, month, anchor) {
  const days = [];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const unit = getShiftUnit(anchor, ds);
    days.push({ date:ds, day:d, unit, isToday: ds===todayStr() });
  }
  return days;
}
function fmtDateLong(s) {
  if(!s) return "";
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
}
function fmtDateShort(s) {
  if(!s) return "";
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

               ...ex }}>

// TODAY / DAY STAFFING — drag & drop board
// ════════════════════════════════════════════════════════════════════════════
function DayBoard({ roster, stations, dayState, onChange, shiftUnitKey, compact, duties, thresholds, weeklyDuties }) {
  const dragEmpId = useRef(null);
  const [dragOver, setDragOver] = useState(null);

  const { onDuty: onDutyIds, assignments, notes } = dayState;
  const tMin = thresholds?.min ?? 16;
  const tMax = thresholds?.max ?? 20;

  const assignedSet   = useMemo(()=>new Set(Object.values(assignments).filter(Boolean)),[assignments]);
  const onDutyList    = useMemo(()=>roster.filter(e=>onDutyIds.includes(e.id)),[roster,onDutyIds]);
  const availableList = useMemo(()=>onDutyList.filter(e=>!assignedSet.has(e.id)),[onDutyList,assignedSet]);

  const count    = onDutyList.length;
  const countOK  = count>=tMin && count<=tMax;

  const [rosterQ,   setRosterQ]   = useState("");
  const [certFilt,  setCertFilt]  = useState(null);
  const [unitFilt,  setUnitFilt]  = useState(null);
  const [resetConf, setResetConf] = useState(false);

  const filteredRoster = roster.filter(e=>{
    if(rosterQ&&!e.name.toLowerCase().includes(rosterQ.toLowerCase())) return false;
    if(certFilt&&!e.certs[certFilt]) return false;
    if(unitFilt&&e.unit!==unitFilt) return false;
    return true;
  });

  function onDragStart(e, empId) {
    const emp=roster.find(r=>r.id===empId);
    if(emp?.absence) { e.preventDefault(); return; }
    dragEmpId.current = empId;
    e.dataTransfer.effectAllowed = "move";
  }
  function onSlotDragOver(e, slotId, slot) {
    e.preventDefault();
    const empId = dragEmpId.current;
    if(!empId) return;
    const emp = roster.find(r=>r.id===empId);
    if(!emp) return;
    if(slot.requiredCert && !meetsReq(emp, slot.requiredCert)) { e.dataTransfer.dropEffect="none"; return; }
    e.dataTransfer.dropEffect = "move";
    setDragOver(slotId);
  }
  function onSlotDrop(e, slotId, slot) {
    e.preventDefault();
    setDragOver(null);
    const empId = dragEmpId.current;
    if(!empId) return;
    const emp = roster.find(r=>r.id===empId);
    if(!emp || emp.absence) return;
    if(slot.requiredCert && !meetsReq(emp, slot.requiredCert)) return;
    const nextOnDuty = onDutyIds.includes(empId) ? onDutyIds : [...onDutyIds, empId];
    const nextAssign = {...assignments};
    Object.keys(nextAssign).forEach(k=>{ if(nextAssign[k]===empId) nextAssign[k]=null; });
    nextAssign[slotId] = empId;
    onChange({ ...dayState, onDuty:nextOnDuty, assignments:nextAssign });
    dragEmpId.current = null;
  }
  function onDragEnd() { dragEmpId.current=null; setDragOver(null); }

  const [confirmPending, setConfirmPending] = useState(null);

  function requestRemoveFromDuty(emp) {
    if (!onDutyIds.includes(emp.id)) return;
    setConfirmPending({ type:"offduty", empId:emp.id, name:emp.name });
  }
  function requestClearSlot(slotId, empName) {
    setConfirmPending({ type:"slot", slotId, name:empName });
  }
  function confirmRemove() {
    if (!confirmPending) return;
    if (confirmPending.type === "offduty") {
      const nextA = {...assignments};
      Object.keys(nextA).forEach(k=>{ if(nextA[k]===confirmPending.empId) nextA[k]=null; });
      onChange({ ...dayState, onDuty:onDutyIds.filter(x=>x!==confirmPending.empId), assignments:nextA });
    } else {
      onChange({ ...dayState, onDuty:onDutyIds, assignments:{...assignments,[confirmPending.slotId]:null} });
    }
    setConfirmPending(null);
  }

  function toggleOnDuty(empId) {
    const emp = roster.find(r=>r.id===empId);
    if(emp?.absence) return;
    if(onDutyIds.includes(empId)) { requestRemoveFromDuty(emp); }
    else { onChange({ ...dayState, onDuty:[...onDutyIds,empId], assignments }); }
  }

  function updateNotes(val) {
    onChange({ ...dayState, notes: val });
  }

  function unitOK(unit) {
    return unit.slots.filter(sl => {
      const empId = assignments[sl.id];
      return empId && roster.find(e => e.id === empId);
    }).length >= unit.minSlots;
  }

  const certCounts = useMemo(()=>{
    const c={}; CERT_DEFS.forEach(cd=>{c[cd.key]=onDutyList.filter(e=>e.certs[cd.key]).length;});
    return c;
  },[onDutyList]);

  const shiftUD = unitDef(shiftUnitKey);

  function doPrint() {
    const w=window.open("","_blank");
    if(!w){ alert("Print blocked — please allow popups for this page and try again."); return; }

    const today      = todayStr();
    const dateLong   = fmtDateLong(today);
    const unitLabel  = shiftUD ? shiftUD.label : "";
    const generated  = new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});

    // Cert summary for header strip
    const certSummary = CERT_DEFS.map(cd => {
      const n = onDutyList.filter(e=>e.certs[cd.key]).length;
      return n > 0 ? `<span class="cert-pip"><span class="cert-count">${n}</span> ${cd.label}</span>` : "";
    }).join("");

    // Apparatus sections — each station is a row of unit cards
    let apparatusHtml = "";
    stations.forEach(st => {
      let unitCards = "";
      st.units.forEach(u => {
        const ok = unitOK(u);
        let rows = "";
        u.slots.forEach(sl => {
          const emp = roster.find(e => e.id === assignments[sl.id]);
          const lastName = emp ? emp.name.split(",")[0].trim() : "";
          const firstName = emp ? (emp.name.split(",")[1]||"").trim() : "";
          const displayName = emp ? (firstName ? `${lastName}, ${firstName}` : lastName) : "";
          rows += `<tr class="${emp?'filled':'open-row'}">
            <td class="pos-label">${sl.label}</td>
            <td class="pos-name">${displayName || '<span class="dash">—</span>'}</td>
          </tr>`;
        });
        unitCards += `<div class="unit-card ${ok?"ok":"open"}">
          <div class="unit-hdr">
            <span class="unit-name">${u.label}</span>
            <span class="unit-pill ${ok?"pill-ok":"pill-open"}">${ok?"✓":"○"}</span>
          </div>
          <table><tbody>${rows}</tbody></table>
        </div>`;
      });
      apparatusHtml += `<div class="station-block">
        <div class="station-rule"><span class="station-name">${st.label}</span></div>
        <div class="unit-grid">${unitCards}</div>
      </div>`;
    });

    // Unassigned — clean pill list
    let unassignedHtml = "";
    if (availableList.length) {
      const pills = availableList.map(e => `<span class="name-pill">${e.name}</span>`).join("");
      unassignedHtml = `<div class="bottom-section">
        <div class="bottom-label">Unassigned On-Duty &nbsp;<span class="bottom-count">${availableList.length}</span></div>
        <div class="name-pills">${pills}</div>
      </div>`;
    }

    // Recurring duties
    let dutiesHtml = "";
    if (duties && duties.length > 0) {
      const rows = duties.map(d =>
        `<div class="duty-row">
          <span class="duty-title">${d.title}</span>
          ${d.assignedTo ? `<span class="duty-assign">${d.assignedTo}</span>` : ""}
        </div>`
      ).join("");
      dutiesHtml = `<div class="duties-block"><div class="duties-label">📋 Daily Duties</div>${rows}</div>`;
    }

    // Weekly duties
    const DOW_KEYS = ["sun","mon","tue","wed","thu","fri","sat"];
    const DOW_LABELS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const todayDow = new Date(today+"T12:00:00").getDay(); // 0=Sun
    let weeklyHtml = "";
    if (weeklyDuties && DOW_KEYS.some(k => weeklyDuties[k]?.trim())) {
      const cells = DOW_KEYS.map((k, i) => {
        const isToday = i === todayDow;
        const val = weeklyDuties[k] || "";
        return `<div class="wd-cell ${isToday?"wd-today":""}">
          <div class="wd-dow">${DOW_LABELS[i]}</div>
          <div class="wd-val">${val || '<span class="wd-empty">—</span>'}</div>
        </div>`;
      }).join("");
      weeklyHtml = `<div class="weekly-block"><div class="duties-label">📅 Weekly Duties</div><div class="wd-grid">${cells}</div></div>`;
    }

    // Notes
    let notesHtml = "";
    if (notes && notes.trim()) {
      const safe = notes.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      notesHtml = `<div class="bottom-section">
        <div class="bottom-label">Shift Notes</div>
        <div class="notes-body">${safe}</div>
      </div>`;
    }

    const h = `<!DOCTYPE html>

            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {CERT_DEFS.map(c=>(
                <span key={c.key} style={{ background:c.color+"20", color:c.color,
                  border:`1px solid ${c.color}40`, borderRadius:6, padding:"3px 8px",
                  fontSize:11, fontWeight:700 }}>
                  {c.label} {certCounts[c.key]}
                </span>
              ))}
            </div>
          )}
        </div>

        {/* Unassigned holding area */}
        {availableList.length>0 && (
          <div style={{ background:`linear-gradient(135deg,${C.amberDim},#241807)`,
            border:`1px solid ${C.amberBorder}`, borderRadius:12, padding:"11px 13px" }}>
            <div style={{ fontSize:11, fontWeight:800, color:C.amber, marginBottom:8, letterSpacing:.8 }}>
              ON DUTY — UNASSIGNED ({availableList.length})
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              {availableList.map(e=>{
                const ud=unitDef(e.unit);
                return (
                  <div key={e.id} draggable onDragStart={ev=>onDragStart(ev,e.id)} onDragEnd={onDragEnd}
                    style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 9px",
                      borderRadius:7, cursor:"grab", userSelect:"none",
                      background:ud?ud.bg:C.bg3, border:`1px solid ${ud?ud.border:C.border}`,
                      transition:"transform .1s" }}>
                    {ud && <div style={{ width:3, height:20, borderRadius:2, background:ud.color }}/>}
                    <span style={{ fontSize:12, fontWeight:600, color:ud?ud.text:C.text,
                      flex:1, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {e.name}
                    </span>
                    <span style={{ fontSize:10, color:C.textMuted }}>☰</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Full roster */}
        <div style={{ ...base.card, padding:13 }}>
          <div style={{ fontSize:11, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
            letterSpacing:1.2, marginBottom:9 }}>
            Roster <span style={{ color:C.textMuted, fontWeight:400 }}>— click ✓ or drag to board</span>
          </div>
          <input style={{ ...base.input, marginBottom:9 }} placeholder="Search name…"
            value={rosterQ} onChange={e=>setRosterQ(e.target.value)}/>
          <div style={{ fontSize:9, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
            letterSpacing:1, marginBottom:5 }}>Filter by Cert</div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:8 }}>
            <FilterPill label="All" active={!certFilt&&!unitFilt} color={C.textSub}
              onClick={()=>{setCertFilt(null);setUnitFilt(null);}}/>
            {CERT_DEFS.map(c=>(
              <FilterPill key={c.key} label={c.label} active={certFilt===c.key} color={c.color}
                onClick={()=>{setCertFilt(p=>p===c.key?null:c.key);setUnitFilt(null);}}/>
            ))}
          </div>
          <div style={{ fontSize:9, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
            letterSpacing:1, marginBottom:5 }}>Filter by Unit</div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:9 }}>
            {UNIT_DEFS.map(u=>(
              <FilterPill key={u.key} label={u.label} active={unitFilt===u.key} color={u.color}
                onClick={()=>{setUnitFilt(p=>p===u.key?null:u.key);setCertFilt(null);}}/>
            ))}
          </div>
          <div style={{ maxHeight:compact?220:310, overflowY:"auto", display:"flex", flexDirection:"column", gap:3 }}>
            {filteredRoster.map(emp=>{
              const onDuty   = onDutyIds.includes(emp.id);
              const assigned = assignedSet.has(emp.id);
              const absent   = !!emp.absence;
              const ud       = unitDef(emp.unit);
              return (
                <div key={emp.id}
                  draggable={!absent}
                  onDragStart={ev=>onDragStart(ev,emp.id)}
                  onDragEnd={onDragEnd}
                  onClick={()=>!absent&&toggleOnDuty(emp.id)}
                  style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 9px",
                    borderRadius:7, cursor:absent?"default":"pointer",
                    background: absent ? C.bg1 : onDuty ? (ud?ud.bg:C.greenDim) : C.bg1,
                    border:`1px solid ${absent?C.border:onDuty?(ud?ud.border:C.greenBorder):C.border}`,
                    opacity:absent?.4:1, transition:"background .12s,border .12s", userSelect:"none" }}>
                  {ud && !absent && <div style={{ width:3, height:24, borderRadius:2, background:ud.color }}/>}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, fontWeight:onDuty?700:400,
                      color:absent?C.textMuted:onDuty?(ud?ud.text:C.green):C.text,
                      whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                      {emp.name}
                    </div>
                    <div style={{ marginTop:3 }}>
                      {absent ? <AbsenceBadge absKey={emp.absence}/> : <CertChips certs={emp.certs}/>}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:4, alignItems:"center", flexShrink:0 }}>
                    {ud && !absent && <UnitBadge unitKey={emp.unit} small/>}
                    {!absent && (
                      <span style={{ fontSize:16, fontWeight:700,
                        color: onDuty ? (assigned?"#38bdf8":(ud?ud.text:C.green)) : C.textMuted,
                        lineHeight:1 }}>
                        {onDuty ? (assigned ? "📌" : "✓") : "+"}
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
            {filteredRoster.length===0 && (
              <div style={{ color:C.textMuted, fontSize:12, padding:"16px 0", textAlign:"center" }}>No results</div>
            )}
          </div>
        </div>

        {/* Action buttons */}
        {!compact && (
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={doPrint} variant="secondary" style={{ flex:1, justifyContent:"center" }}>🖨 Print</Btn>
            <Btn onClick={()=>setResetConf(true)} variant="danger" style={{ flex:1, justifyContent:"center" }}>↺ Reset</Btn>
          </div>
        )}
        {compact && <Btn onClick={()=>setResetConf(true)} variant="danger" size="sm">↺ Reset Day</Btn>}
      </div>

      {/* ── RIGHT: Apparatus + Notes ── */}
      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

        {/* Recurring duties display */}
        <RecurringDutiesPanel duties={duties}/>

        {/* Apparatus drop zones */}
        {stations.map(station=>{
          const allUnitsOK  = station.units.every(u=>unitOK(u));
          const someUnitsOK = station.units.some(u=>unitOK(u));
          return (
            <div key={station.id}
              className={allUnitsOK?"staffed-card":""}
              style={{ background: allUnitsOK
                ? `linear-gradient(135deg,${C.staffedBg} 0%,#033d28 100%)`
                : C.bg1,
                border:`1px solid ${allUnitsOK?C.staffedBorder:station.color+"50"}`,
                borderRadius:14, padding:16,
                boxShadow: allUnitsOK ? C.staffedGlow : `0 0 0 1px ${station.color}20` }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                <div style={{ width:5, height:26, borderRadius:3, background:station.color,
                  flexShrink:0, boxShadow:`0 0 8px ${station.color}60` }}/>
                <span style={{ fontWeight:900, fontSize:16, color:C.text, flex:1, letterSpacing:.2 }}>{station.label}</span>
                <span style={{ fontSize:11, fontWeight:800, padding:"4px 10px", borderRadius:8,
                  background: allUnitsOK ? C.greenDim : someUnitsOK ? C.amberDim : C.bg2,
                  color: allUnitsOK ? C.green : someUnitsOK ? C.amber : C.textMuted,
                  border:`1px solid ${allUnitsOK?C.greenBorder:someUnitsOK?C.amberBorder:C.border}` }}>
                  {allUnitsOK ? "✓ All Staffed" : someUnitsOK ? "Partial" : "Open"}
                </span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))", gap:10 }}>
                {station.units.map(unit=>{
                  const ok = unitOK(unit);
                  return (
                    <div key={unit.id}
                      style={{ background: ok ? C.staffedBg : C.bg0,
                        border:`1px solid ${ok?C.staffedBorder:C.border}`,
                        borderRadius:10, padding:12,
                        boxShadow: ok ? "0 0 12px #34d39918" : "none",
                        transition:"all .3s" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                        <span style={{ fontWeight:700, fontSize:12, color:ok?C.green:C.textSub }}>{unit.label}</span>
                        <span style={{ fontSize:10, fontWeight:800,
                          color:ok?C.green:C.textMuted,
                          background:ok?C.greenDim:C.bg2,
                          border:`1px solid ${ok?C.greenBorder:C.border}`,
                          borderRadius:6, padding:"2px 7px" }}>
                          {ok ? "✓ STAFFED" : "OPEN"}
                        </span>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                        {unit.slots.map(slot=>{
                          const empId   = assignments[slot.id];
                          const emp     = empId ? roster.find(e=>e.id===empId) : null; // null if deleted
                          const ud      = emp ? unitDef(emp.unit) : null;
                          const cd      = slot.requiredCert ? certDef(slot.requiredCert) : null;
                          const hovering = dragOver===slot.id;
                          return (
                            <div key={slot.id}
                              onDragOver={ev=>onSlotDragOver(ev,slot.id,slot)}
                              onDragLeave={ev=>{if(!ev.currentTarget.contains(ev.relatedTarget))setDragOver(null);}}
                              onDrop={ev=>onSlotDrop(ev,slot.id,slot)}
                              style={{ display:"flex", alignItems:"center", gap:6 }}>
                              <div style={{ flex:1,
                                background: hovering ? C.bg4 : emp ? C.bg2 : C.bg1,
                                border:`2px ${hovering?"dashed":"solid"} ${hovering?C.accent:emp?C.borderHi:C.border}`,
                                borderRadius:8, padding:"7px 10px", minHeight:36,
                                display:"flex", alignItems:"center", justifyContent:"space-between",
                                transition:"all .12s",
                                boxShadow: hovering ? `0 0 0 3px ${C.accent}30,0 4px 12px ${C.accent}20` : emp ? "none" : "inset 0 1px 4px #00000030",
                                cursor: emp ? "default" : "copy" }}>
                                {emp ? (
                                  <div style={{ display:"flex", alignItems:"center", gap:6, minWidth:0 }}>
                                    {ud && <div style={{ width:3, height:22, borderRadius:2, background:ud.color, flexShrink:0 }}/>}
                                    <span style={{ fontSize:12, fontWeight:600, color:C.text,
                                      whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                                      {emp.name}
                                    </span>
                                    {ud && <UnitBadge unitKey={emp.unit} small/>}
                                  </div>
                                ) : (
                                  <span style={{ fontSize:11, color: hovering ? C.accent : C.textMuted,
                                    fontWeight: hovering ? 700 : 400 }}>
                                    {hovering ? "📥 Drop here" : (
                                      <>
                                        {slot.label}
                                        {cd && <span style={{ color:cd.color, marginLeft:5, fontSize:10, fontWeight:700 }}>[{cd.label}]</span>}
                                      </>
                                    )}
                                  </span>
                                )}
                              </div>
                              {emp && (
                                <Btn onClick={()=>requestClearSlot(slot.id, emp.name)} variant="danger" size="sm"
                                  style={{ padding:"5px 9px" }}>✕</Btn>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* Notes panel — always at the bottom of the right column */}
        <NotesPanel notes={notes} onChange={updateNotes}/>

      </div>

      {/* Removal confirmation */}
      {confirmPending && (
        <div style={{ position:"fixed", inset:0, zIndex:490,
          display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={()=>setConfirmPending(null)}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:C.bg2, border:`1px solid ${C.redBorder}`,
              borderRadius:12, padding:"16px 20px", maxWidth:320, width:"90%",
              boxShadow:"0 8px 40px #00000090, 0 0 0 1px #7f1d1d",
              display:"flex", flexDirection:"column", gap:12 }}>
            <div>
              <div style={{ fontSize:13, fontWeight:800, color:C.red, marginBottom:4 }}>
                {confirmPending.type==="offduty" ? "Remove from duty?" : "Remove from slot?"}
              </div>
              <div style={{ fontSize:12, color:C.textSub, lineHeight:1.5 }}>
                <b style={{ color:C.text }}>{confirmPending.name}</b>
                {confirmPending.type==="offduty"
                  ? " will be removed from duty and unassigned from all trucks."
                  : " will be removed from this slot but stays on duty."}
              </div>
            </div>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn onClick={()=>setConfirmPending(null)} variant="ghost" size="sm">Keep</Btn>
              <Btn onClick={confirmRemove} variant="danger" size="sm">Yes, Remove</Btn>
            </div>
          </div>
        </div>
      )}

      {resetConf && (
        <Confirm msg="Clear all on-duty selections and assignments for this day?"
          yesLabel="Reset Day" yesVariant="danger"
          onYes={()=>{ onChange({...emptyDay()}); setResetConf(false); }}
          onNo={()=>setResetConf(false)}/>
      )}
    </div>
  );
}

// TODAY TAB

function TodayTab({ roster, stations, dayState, onChange, anchor, duties, thresholds, weeklyDuties, rotations }) {
  const today = todayStr();
  const shiftUnit = getShiftUnit(anchor, today);
  const shiftUD   = unitDef(shiftUnit);
  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{fmtDateLong(today)}</div>
          <div style={{fontSize:11,color:shiftUD?.text,fontWeight:700,marginTop:2}}>{shiftUD?.label}</div>
        </div>
        {shiftUD&&<UnitBadge unitKey={shiftUnit}/>}

      {rotations && rotations.length > 0 && (
        <DayRotationPanel rotations={rotations} roster={roster} stations={stations} date={today} anchor={anchor}/>

}

// PLANNER TAB
// ════════════════════════════════════════════════════════════════════════════
function PlannerTab({ roster, stations, plannerDays, setPlannerDays, anchor, setAnchor, duties, thresholds, rotations }) {
  const now = new Date();
  const [viewYear,  setViewYear]  = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const [selected,  setSelected]  = useState(null);
  const [copyConf,  setCopyConf]  = useState(null);
  const [copyNoSrc, setCopyNoSrc] = useState(false);
  const [resetConf, setResetConf] = useState(null);
  const [editAnchor,setEditAnchor]= useState(false);

  const calDays = useMemo(()=>getMonthShifts(viewYear,viewMonth,anchor),[viewYear,viewMonth,anchor]);

  function getDayState(date) {
    return plannerDays.find(d=>d.date===date) || {date,...emptyDay()};
  }
  function updateDay(date, state) {
    const exists = plannerDays.find(d=>d.date===date);
    const next = exists ? plannerDays.map(d=>d.date===date?{...state,date}:d) : [...plannerDays,{...state,date}];
    setPlannerDays(next);
  }
  function resetDay(date) {
    setPlannerDays(plannerDays.filter(d=>d.date!==date));
    setResetConf(null); setSelected(null);
  }
  function copyToday(date) {
    const src = plannerDays.filter(d=>d.date<date&&d.onDuty.length>0).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(!src){ setCopyConf(null); setCopyNoSrc(true); return; }
    updateDay(date,{onDuty:[...src.onDuty],assignments:{...src.assignments},notes:src.notes??""});
    setCopyConf(null);
  }

  const prevMonth=()=>{ if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); };
  const nextMonth=()=>{ if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); };
  const monthName=new Date(viewYear,viewMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});

  const selectedDayState = selected ? getDayState(selected) : null;
  const selectedUnit     = selected ? getShiftUnit(anchor, selected) : null;
  const tMin = thresholds?.min ?? 16;
  const tMax = thresholds?.max ?? 20;

  const firstDow   = new Date(viewYear,viewMonth,1).getDay();
  const totalCells = Math.ceil((firstDow + calDays.length)/7)*7;
  const cells = [];
  for(let i=0;i<totalCells;i++){
    const dayIdx=i-firstDow;
    cells.push(dayIdx>=0&&dayIdx<calDays.length ? calDays[dayIdx] : null);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"calc(100vh - 62px)"}}>
      <div style={{padding:16,overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <Btn onClick={prevMonth} variant="secondary" size="sm">‹</Btn>
          <span style={{fontWeight:800,fontSize:16,flex:1,textAlign:"center"}}>{monthName}</span>
          <Btn onClick={nextMonth} variant="secondary" size="sm">›</Btn>
          <Btn onClick={()=>setEditAnchor(true)} variant="ghost" size="sm">⚙ Rotation</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.textMuted,padding:"4px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={i}/>;
            const ud=unitDef(day.unit);
            const ds=getDayState(day.date);
            const hasData=ds.onDuty.length>0;
            const countOK=ds.onDuty.length>=tMin&&ds.onDuty.length<=tMax;
            const hasNotes=!!(ds.notes&&ds.notes.trim());
            return (
              <div key={day.date} onClick={()=>setSelected(day.date)}
                style={{borderRadius:10,padding:"10px 8px",cursor:"pointer",minHeight:80,
                  background:ud?.bg||C.bg2,
                  border:`2px solid ${day.isToday?C.accent:(ud?.border||C.border)}`,
                  boxShadow:day.isToday?`0 0 0 2px ${C.accent}40`:"none",
                  transition:"all .12s",display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                <div style={{fontSize:13,fontWeight:800,color:day.isToday?C.accent:(ud?ud.text:C.textMuted)}}>{day.day}</div>
                <span style={{fontSize:10,fontWeight:800,color:ud?.text,background:ud?.color+"30",
                  border:`1px solid ${ud?.border}`,borderRadius:4,padding:"2px 6px"}}>{ud?.label}</span>
                {hasData
                  ? <span style={{fontSize:10,fontWeight:700,color:countOK?C.green:C.amber}}>{ds.onDuty.length} on duty</span>
                  : <span style={{fontSize:10,color:C.textMuted}}>tap to plan</span>}
                {hasNotes && <span style={{fontSize:9,color:C.accentHov}}>📝</span>}
                {rotations && rotations.length > 0 && (
                  <div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}}>
                    {rotations.map(rot=>{
                      const member = getCrewMemberForDate(rot, day.date, anchor);
                      if (!member) return null;
                      return (
                        <span key={rot.id} title={`${rot.name}: ${member.label}`}
                          style={{width:6,height:6,borderRadius:"50%",background:rot.color,
                            display:"inline-block",flexShrink:0}}/>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:14,marginTop:16,flexWrap:"wrap"}}>
          {UNIT_DEFS.map(u=>(
            <span key={u.key} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:u.text}}>
              <span style={{width:10,height:10,borderRadius:2,background:u.color,display:"inline-block"}}/>
              {u.label}
            </span>
          ))}
          <span style={{fontSize:11,color:C.textMuted}}>📝 = has notes · Click any day to open full staffing board</span>
        </div>
      </div>

      {/* Full-screen day modal */}
      {selected && (
        <div style={{position:"fixed",inset:0,background:"rgba(3,9,18,.92)",zIndex:450,
          display:"flex",flexDirection:"column",backdropFilter:"blur(4px)"}}>
          <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,
            padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,
            boxShadow:"0 2px 16px #00000060"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:16,color:C.text}}>{fmtDateLong(selected)}</div>
              <div style={{fontSize:11,color:unitDef(selectedUnit)?.text,fontWeight:700,marginTop:2}}>
                {unitDef(selectedUnit)?.label}
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Btn onClick={()=>setCopyConf(selected)} variant="secondary" size="sm">📋 Copy Previous</Btn>
              <Btn onClick={()=>setResetConf(selected)} variant="danger" size="sm">↺ Reset</Btn>
              <Btn onClick={()=>setSelected(null)} variant="ghost" size="sm" style={{fontSize:18,padding:"4px 10px"}}>✕</Btn>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16}}>
            {rotations && rotations.length > 0 && (
              <DayRotationPanel rotations={rotations} roster={roster} stations={stations} date={selected} anchor={anchor}/>
            )}
            <DayBoard roster={roster} stations={stations} dayState={selectedDayState}
              onChange={state=>updateDay(selected,state)} shiftUnitKey={selectedUnit}
              compact duties={duties} thresholds={thresholds}/>
          </div>
        </div>
      )}

      {editAnchor&&<RotationModal anchor={anchor} onSave={a=>{setAnchor(a);setEditAnchor(false);}} onClose={()=>setEditAnchor(false)}/>}
      {copyConf&&(
        <Confirm msg="Copy the most recently planned shift's roster and assignments to this day?"
          yesLabel="Copy" yesVariant="primary" onYes={()=>copyToday(copyConf)} onNo={()=>setCopyConf(null)}/>
      )}
      {copyNoSrc&&(
        <Modal title="Nothing to Copy" onClose={()=>setCopyNoSrc(false)} width={360}>
          <p style={{margin:"0 0 16px",color:C.textSub,lineHeight:1.7,fontSize:14}}>
            No previously planned shift found to copy from. Plan a shift on an earlier date first.
          </p>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn onClick={()=>setCopyNoSrc(false)} variant="primary">OK</Btn>
          </div>
        </Modal>
      )}
      {resetConf&&(
        <Confirm msg={`Reset all staffing for ${fmtDateShort(resetConf)}?`} yesLabel="Reset"
          onYes={()=>resetDay(resetConf)} onNo={()=>setResetConf(null)}/>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// DAY ROTATION PANEL — compact banner shown on Today + Planner day view
// ════════════════════════════════════════════════════════════════════════════
function DayRotationPanel({ rotations, roster, stations, date, anchor }) {
  if (!rotations || rotations.length === 0) return null;
  const items = rotations.map(rot => {
    const member = getCrewMemberForDate(rot, date, anchor);
    const emp = member?.empId ? roster.find(e => e.id === member.empId) : null;
    const station = stations?.find(s => s.id === rot.stationId);
    const apparatus = station?.units?.find(u => u.id === rot.unitId);
    return { rot, member, emp, station, apparatus };
  }).filter(x => x.member); // only show rotations that have data for this date
  if (!items.length) return null;
  return (
    <div style={{ background:C.bg1, border:`1px solid ${C.borderHi}`, borderRadius:12,
      padding:"10px 14px", marginBottom:14 }}>
      <div style={{ fontSize:10, fontWeight:800, color:C.textMuted, textTransform:"uppercase",
        letterSpacing:1.2, marginBottom:8 }}>🔄 Crew Rotations — {fmtDateShort(date)}</div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        {items.map(({ rot, member, emp, station, apparatus }) => (
          <div key={rot.id} style={{ background:C.bg2, border:`1px solid ${rot.color}50`,
            borderRadius:8, padding:"6px 10px", display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:3, height:28, borderRadius:2, background:rot.color, flexShrink:0 }}/>
            <div>
              <div style={{ fontSize:10, fontWeight:800, color:rot.color, letterSpacing:.3 }}>
                {apparatus?.label || station?.label || rot.name}
              </div>
              <div style={{ fontSize:12, fontWeight:700, color:C.text }}>
                {member.label || (emp ? emp.name : "—")}
              </div>
              {emp && member.label && (
                <div style={{ fontSize:10, color:C.textSub }}>{emp.name}</div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ROTATIONS TAB — crew rotation manager
// ════════════════════════════════════════════════════════════════════════════
const ROTATION_COLORS = [
  "#f97316","#3b82f6","#22c55e","#a855f7","#ef4444",
  "#06b6d4","#eab308","#ec4899","#14b8a6","#f43f5e",
];

function RotationsTab({ roster, stations, rotations, setRotations, anchor }) {
  const [editing, setEditing] = useState(null);
  const [del,     setDel]     = useState(null);
  const [preview, setPreview] = useState(null);
  const today = todayStr();

  function saveRotation(rot) {
    const exists = rotations.find(r => r.id === rot.id);
    setRotations(exists
      ? rotations.map(r => r.id === rot.id ? rot : r)
      : [...rotations, rot]);
    setEditing(null);
  }
  function deleteRotation(id) {
    setRotations(rotations.filter(r => r.id !== id));
    setDel(null);
  }

  return (
    <div style={{ padding:14, maxWidth:900 }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:16, gap:12 }}>
        <div>
          <div style={{ fontSize:18, fontWeight:900, color:C.text, marginBottom:4 }}>🔄 Crew Rotations</div>
          <div style={{ fontSize:12, color:C.textMuted, lineHeight:1.7, maxWidth:560 }}>
            Build crew rotations per apparatus and shift. Each rotation tracks who covers a specific
            position (e.g. "Ladder 23 Tillerman") across multiple crews on a repeating shift cycle.
            The rotation advances every <b style={{color:C.textSub}}>N shift days</b> — for 24/24/24, set shift days to 3.
          </div>
        </div>
        <Btn onClick={()=>setEditing({
          id:uid(), name:"", color:ROTATION_COLORS[rotations.length % ROTATION_COLORS.length],
          stationId:"", unitId:"", shiftDays:3, anchorDate:today,
          crew:[],
        })} variant="primary">+ New Rotation</Btn>
      </div>

      {rotations.length === 0 && (
        <div style={{ background:C.bg1, border:`2px dashed ${C.border}`, borderRadius:14,
          padding:"40px 20px", textAlign:"center" }}>
          <div style={{ fontSize:32, marginBottom:10 }}>🔄</div>
          <div style={{ fontSize:14, fontWeight:700, color:C.textSub, marginBottom:6 }}>No crew rotations yet</div>
          <div style={{ fontSize:12, color:C.textMuted, maxWidth:460, margin:"0 auto 20px", lineHeight:1.7 }}>
            Example: "Station 22 Engine Officer" with 3 crews rotating every 3 days.
            Each crew member takes their turn based on the shift cycle.
          </div>
          <Btn onClick={()=>setEditing({
            id:uid(), name:"", color:ROTATION_COLORS[0],
            stationId:"", unitId:"", shiftDays:3, anchorDate:today, crew:[],
          })} variant="primary">Create First Rotation</Btn>
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {rotations.map(rot => {
          const station = stations.find(s => s.id === rot.stationId);
          const apparatus = station?.units?.find(u => u.id === rot.unitId);
          const todayMember = getCrewMemberForDate(rot, today, anchor);
          const todayEmp = todayMember?.empId ? roster.find(e => e.id === todayMember.empId) : null;
          const isPreview = preview === rot.id;
          const crewCount = rot.crew?.length || 0;

          // Build 6-day preview (2 full cycles for 3-crew)
          const previewDays = [];
          if (isPreview) {
            for (let i = 0; i < Math.min(crewCount * 2 * rot.shiftDays, 42); i++) {
              const d = new Date(today + "T12:00:00");
              d.setDate(d.getDate() + i);
              const ds = d.toISOString().slice(0, 10);
              const member = getCrewMemberForDate(rot, ds, anchor);
              const emp = member?.empId ? roster.find(e => e.id === member.empId) : null;
              const shiftUnit = getShiftUnit(anchor, ds);
              previewDays.push({ date:ds, member, emp, shiftUnit, isToday:i===0 });
            }
          }

          return (
            <div key={rot.id} style={{ background:C.bg1, border:`1px solid ${rot.color}40`,
              borderRadius:12, overflow:"hidden" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12,
                padding:"12px 16px", borderBottom:`1px solid ${rot.color}20` }}>
                <div style={{ width:5, height:44, borderRadius:3, background:rot.color, flexShrink:0 }}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:15, fontWeight:900, color:C.text }}>{rot.name}</div>
                  <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>
                    {station ? station.label : "No station"}{apparatus ? ` › ${apparatus.label}` : ""}
                    {" · "}{crewCount} crew{crewCount!==1?"s":""}{" · "}{rot.shiftDays}-day shift cycle
                  </div>
                </div>
                <div style={{ background:`${rot.color}18`, border:`1px solid ${rot.color}50`,
                  borderRadius:10, padding:"6px 12px", textAlign:"center", flexShrink:0 }}>
                  <div style={{ fontSize:8, fontWeight:800, color:rot.color, letterSpacing:1,
                    textTransform:"uppercase", marginBottom:1 }}>Today</div>
                  <div style={{ fontSize:12, fontWeight:800, color:C.text }}>
                    {todayMember ? (todayMember.label || "—") : "—"}
                  </div>
                  {todayEmp && (
                    <div style={{ fontSize:10, color:C.textSub }}>{todayEmp.name.split(",")[0]}</div>
                  )}
                </div>
                <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                  <Btn onClick={()=>setPreview(isPreview ? null : rot.id)} variant="ghost" size="sm">
                    {isPreview ? "▲ Hide" : "📅 Preview"}
                  </Btn>
                  <Btn onClick={()=>setEditing({...rot, crew:(rot.crew||[]).map(c=>({...c}))})} variant="secondary" size="sm">✎</Btn>
                  <Btn onClick={()=>setDel(rot)} variant="danger" size="sm">✕</Btn>
                </div>
              </div>

              {/* Crew chips */}
              <div style={{ padding:"10px 16px", display:"flex", gap:6, flexWrap:"wrap" }}>
                {(rot.crew||[]).map((member, idx) => {
                  const emp = member.empId ? roster.find(e => e.id === member.empId) : null;
                  const crewIdx = getCrewIndexForDate(rot, today, anchor);
                  const active = crewIdx === idx;
                  return (
                    <div key={member.id} style={{ background:active?`${rot.color}20`:C.bg2,
                      border:`1px solid ${active?rot.color:C.border}`,
                      borderRadius:8, padding:"5px 10px" }}>
                      <span style={{ fontSize:10, fontWeight:800,
                        color:active?rot.color:C.textMuted }}>{idx+1}. </span>
                      <span style={{ fontSize:12, fontWeight:700,
                        color:active?rot.color:C.text }}>{member.label || emp?.name || "—"}</span>
                      {emp && member.label && (
                        <span style={{ fontSize:10, color:C.textSub, marginLeft:4 }}>({emp.name.split(",")[0]})</span>
                      )}
                      {active && <span style={{ fontSize:10, color:rot.color, fontWeight:800, marginLeft:4 }}>◀ now</span>}
                    </div>
                  );
                })}
              </div>

              {/* Schedule preview */}
              {isPreview && (
                <div style={{ borderTop:`1px solid ${rot.color}20`, padding:"10px 16px" }}>
                  <div style={{ fontSize:10, fontWeight:800, color:C.textMuted, letterSpacing:1,
                    textTransform:"uppercase", marginBottom:8 }}>
                    Upcoming Schedule ({previewDays.length} days)
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))", gap:4 }}>
                    {previewDays.map(({date, member, emp, shiftUnit, isToday}) => {
                      const ud = unitDef(shiftUnit);
                      return (
                        <div key={date} style={{ background:isToday?`${rot.color}18`:C.bg2,
                          border:`1px solid ${isToday?rot.color:C.border}`,
                          borderRadius:7, padding:"5px 7px" }}>
                          <div style={{ fontSize:9, fontWeight:700,
                            color:isToday?rot.color:C.textMuted }}>
                            {new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
                            {ud && <span style={{color:ud.color,marginLeft:4,fontWeight:800}}>U{shiftUnit}</span>}
                          </div>
                          <div style={{ fontSize:11, fontWeight:700,
                            color:isToday?rot.color:C.text, marginTop:1 }}>
                            {member ? (member.label || "—") : "—"}
                          </div>
                          {emp && <div style={{ fontSize:9, color:C.textSub }}>{emp.name.split(",")[0]}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {editing && (
        <CrewRotationEditorModal
          rotation={editing} roster={roster} stations={stations} anchor={anchor}
          onSave={saveRotation} onClose={()=>setEditing(null)}/>
      )}
      {del && (
        <Confirm msg={`Delete rotation "${del.name}"?`} yesLabel="Delete" yesVariant="danger"
          onYes={()=>deleteRotation(del.id)} onNo={()=>setDel(null)}/>
      )}
    </div>
  );
}

// CREW ROTATION EDITOR MODAL
// ════════════════════════════════════════════════════════════════════════════
function CrewRotationEditorModal({ rotation, roster, stations, anchor, onSave, onClose }) {
  const [name,       setName]       = useState(rotation.name);
  const [color,      setColor]      = useState(rotation.color);
  const [stationId,  setStationId]  = useState(rotation.stationId || "");
  const [unitId,     setUnitId]     = useState(rotation.unitId || "");
  const [shiftDays,  setShiftDays]  = useState(String(rotation.shiftDays || 3));
  const [anchorDate, setAnchorDate] = useState(rotation.anchorDate || todayStr());
  const [crew,       setCrew]       = useState((rotation.crew||[]).map(c=>({...c})));
  const [search,     setSearch]     = useState({});

  const selectedStation = stations.find(s => s.id === stationId);
  const apparatusOptions = selectedStation?.units || [];
  const shiftNum = parseInt(shiftDays, 10);
  const valid = name.trim() && crew.length > 0 && !isNaN(shiftNum) && shiftNum >= 1 && anchorDate;
  const sortedRoster = [...roster].sort((a,b)=>a.name.localeCompare(b.name));

  function addCrew() { setCrew(p => [...p, { id:uid(), label:"", empId:null }]); }
  function removeCrew(id) { setCrew(p => p.filter(x => x.id !== id)); }
  function updateCrew(id, field, val) {
    const stored = field === "label" ? val : (val || null);
    setCrew(p => p.map(x => x.id === id ? {...x, [field]: stored} : x));
  }
  function moveCrew(id, dir) {
    const idx = crew.findIndex(c => c.id === id);
    if (idx < 0) return;
    const next = [...crew];
    const swap = idx + dir;
    if (swap < 0 || swap >= next.length) return;
    [next[idx], next[swap]] = [next[swap], next[idx]];
    setCrew(next);
  }
  function handleSave() {
    if (!valid) return;
    onSave({ ...rotation, name:name.trim(), color, stationId, unitId, shiftDays:shiftNum, anchorDate, crew });
  }

  // Live preview: who's up today with current settings
  const tempRot = { ...rotation, name, color, stationId, unitId, shiftDays:shiftNum, anchorDate, crew };
  const previewMember = valid ? getCrewMemberForDate(tempRot, todayStr(), anchor) : null;
  const previewEmp = previewMember?.empId ? roster.find(e => e.id === previewMember.empId) : null;

  return (
    <Modal title={rotation.name ? `Edit: ${rotation.name}` : "New Crew Rotation"} onClose={onClose} width={600}>
      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

        {/* Name + Color */}
        <div style={{ display:"flex", gap:12, alignItems:"flex-end" }}>
          <div style={{ flex:1 }}>
            <label style={base.lbl}>Rotation Name</label>
            <input style={base.input} value={name} onChange={e=>setName(e.target.value)}
              placeholder="e.g. Engine 22 Officer, Ladder 23 Tillerman"/>
          </div>
          <div>
            <label style={base.lbl}>Color</label>
            <div style={{ display:"flex", gap:4, flexWrap:"wrap", alignItems:"center" }}>
              {ROTATION_COLORS.map(c=>(
                <div key={c} onClick={()=>setColor(c)}
                  style={{ width:22, height:22, borderRadius:4, background:c, cursor:"pointer",
                    border:`3px solid ${color===c?"#fff":"transparent"}` }}/>
              ))}
              <input type="color" value={color} onChange={e=>setColor(e.target.value)}
                style={{ width:26, height:26, padding:0, border:"none", background:"none", cursor:"pointer" }}/>
            </div>
          </div>
        </div>

        {/* Station + Apparatus */}
        <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
          <div style={{ flex:1, minWidth:160 }}>
            <label style={base.lbl}>Station (optional)</label>
            <select style={base.input} value={stationId} onChange={e=>{ setStationId(e.target.value); setUnitId(""); }}>
              <option value="">— Any / Not station-specific —</option>
              {stations.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          {selectedStation && (
            <div style={{ flex:1, minWidth:160 }}>
              <label style={base.lbl}>Apparatus (optional)</label>
              <select style={base.input} value={unitId} onChange={e=>setUnitId(e.target.value)}>
                <option value="">— Any apparatus —</option>
                {apparatusOptions.map(u=><option key={u.id} value={u.id}>{u.label}</option>)}
              </select>
            </div>
          )}
        </div>

        {/* Shift cycle */}
        <div style={{ background:C.bg2, border:`1px solid ${C.border}`, borderRadius:10, padding:12 }}>
          <div style={{ fontSize:12, fontWeight:800, color:C.textSub, marginBottom:10 }}>📆 Shift Cycle</div>
          <div style={{ display:"flex", gap:16, flexWrap:"wrap", alignItems:"flex-start" }}>
            <div>
              <label style={base.lbl}>Shift Period (calendar days)</label>
              <input style={{ ...base.input, width:110 }} type="number" min={1} max={30}
                value={shiftDays} onChange={e=>setShiftDays(e.target.value)}/>
              <div style={{ fontSize:10, color:C.textMuted, marginTop:3 }}>
                3 = 24/24/24 · 1 = daily · 7 = weekly
              </div>
            </div>
            <div>
              <label style={base.lbl}>Rotation Start Date</label>
              <input type="date" style={{ ...base.input, width:170 }}
                value={anchorDate} onChange={e=>setAnchorDate(e.target.value)}/>
              <div style={{ fontSize:10, color:C.textMuted, marginTop:3 }}>
                Crew #1 starts their first shift on this date
              </div>
            </div>
            <div style={{ flex:1, minWidth:160 }}>
              <label style={base.lbl}>Cycle math</label>
              <div style={{ fontSize:11, color:C.textMuted, lineHeight:1.7 }}>
                {crew.length > 0 && !isNaN(shiftNum) && shiftNum >= 1
                  ? <>Each crew serves <b style={{color:C.textSub}}>{shiftNum} day{shiftNum!==1?"s":""}</b> then hands off.
                     Full rotation: <b style={{color:C.textSub}}>{crew.length * shiftNum} days</b>.</>
                  : "Add crew members to see cycle info."}
              </div>
            </div>
          </div>
        </div>

        {/* Crew list */}
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
            <div>
              <label style={base.lbl}>Crew Members in Rotation Order</label>
              <div style={{ fontSize:11, color:C.textMuted }}>
                Crew #1 is on duty from the start date · they rotate in sequence
              </div>
            </div>
            <Btn onClick={addCrew} variant="secondary" size="sm">+ Add Crew</Btn>
          </div>

          {crew.length === 0 && (
            <div style={{ background:C.bg2, border:`2px dashed ${C.border}`, borderRadius:8,
              padding:"18px 0", textAlign:"center", color:C.textMuted, fontSize:12 }}>
              No crew yet — add members above
            </div>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {crew.map((member, idx) => {
              const srch = search[member.id] ?? "";
              const matchRoster = sortedRoster.filter(e =>
                !srch || e.name.toLowerCase().includes(srch.toLowerCase())
              );
              const assignedEmp = member.empId ? roster.find(e => e.id === member.empId) : null;
              return (
                <div key={member.id} style={{ background:C.bg2, border:`1px solid ${C.border}`,
                  borderRadius:10, padding:"10px 12px" }}>
                  <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                    <div style={{ display:"flex", flexDirection:"column", gap:2, flexShrink:0, paddingTop:2 }}>
                      <button onClick={()=>moveCrew(member.id,-1)} disabled={idx===0}
                        style={{ background:"none", border:"none", cursor:idx===0?"default":"pointer",
                          color:idx===0?C.textMuted:C.textSub, fontSize:13, padding:"0 3px" }}>▲</button>
                      <span style={{ fontSize:10, color:C.textMuted, textAlign:"center", fontWeight:700 }}>{idx+1}</span>
                      <button onClick={()=>moveCrew(member.id,1)} disabled={idx===crew.length-1}
                        style={{ background:"none", border:"none",
                          cursor:idx===crew.length-1?"default":"pointer",
                          color:idx===crew.length-1?C.textMuted:C.textSub, fontSize:13, padding:"0 3px" }}>▼</button>
                    </div>
                    <div style={{ flex:1, display:"flex", flexDirection:"column", gap:6 }}>
                      <input style={base.input} value={member.label}
                        onChange={e=>updateCrew(member.id,"label",e.target.value)}
                        placeholder={`Crew ${idx+1} label (e.g. "A Crew", "Smith", "Unit 1 Crew")`}/>
                      <div style={{ position:"relative" }}>
                        {assignedEmp ? (
                          <div style={{ display:"flex", alignItems:"center", gap:8,
                            background:C.bg1, border:`1px solid ${color}60`, borderRadius:8, padding:"6px 10px" }}>
                            <div style={{ width:3, height:20, borderRadius:2, background:color }}/>
                            <span style={{ fontSize:12, fontWeight:600, color:C.text, flex:1 }}>{assignedEmp.name}</span>
                            <button onClick={()=>{ updateCrew(member.id,"empId",null); setSearch(p=>({...p,[member.id]:""})); }}
                              style={{ background:"none", border:"none", color:C.textMuted, cursor:"pointer", fontSize:14 }}>✕</button>
                          </div>
                        ) : (
                          <div>
                            <input style={{ ...base.input, fontSize:11 }} value={srch}
                              onChange={e=>setSearch(p=>({...p,[member.id]:e.target.value}))}
                              onBlur={()=>setTimeout(()=>setSearch(p=>({...p,[member.id]:""})),180)}
                              placeholder="Link to roster member (optional)"/>
                            {srch && (
                              <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:200,
                                background:C.bg2, border:`1px solid ${C.borderHi}`, borderRadius:8,
                                maxHeight:160, overflowY:"auto", boxShadow:"0 8px 24px #00000060" }}>
                                {matchRoster.slice(0,8).map(e=>(
                                  <div key={e.id} onClick={()=>{ updateCrew(member.id,"empId",e.id); setSearch(p=>({...p,[member.id]:""})); }}
                                    style={{ padding:"7px 12px", cursor:"pointer", fontSize:12, color:C.textSub,
                                      borderBottom:`1px solid ${C.border}` }}
                                    onMouseEnter={ev=>ev.currentTarget.style.background=C.bg3}
                                    onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                                    {e.name}
                                  </div>
                                ))}
                                {matchRoster.length===0 && (
                                  <div style={{ padding:"10px 12px", color:C.textMuted, fontSize:12 }}>No match</div>
                                )}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                      {!isNaN(shiftNum) && shiftNum >= 1 && (
                        <div style={{ fontSize:10, color:C.textMuted }}>
                          On duty days {idx*shiftNum+1}–{(idx+1)*shiftNum} of each {crew.length*shiftNum}-day full cycle
                        </div>
                      )}
                    </div>
                    <Btn onClick={()=>removeCrew(member.id)} variant="danger" size="sm"
                      style={{ padding:"5px 9px", flexShrink:0, alignSelf:"flex-start" }}>✕</Btn>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Live preview */}
        {previewMember && (
          <div style={{ background:`${color}10`, border:`1px solid ${color}40`, borderRadius:10, padding:12 }}>
            <div style={{ fontSize:10, fontWeight:800, color:color, marginBottom:4, letterSpacing:.4, textTransform:"uppercase" }}>
              Preview — on duty today
            </div>
            <div style={{ fontSize:13, fontWeight:700, color:C.text }}>
              {previewMember.label || "—"}
              {previewEmp && <span style={{ fontSize:11, color:C.textSub, marginLeft:8 }}>({previewEmp.name})</span>}
            </div>
          </div>
        )}

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <Btn onClick={onClose} variant="ghost">Cancel</Btn>
          <Btn onClick={handleSave} variant="primary" disabled={!valid}>
            {rotation.name ? "Save Changes" : "Create Rotation"}
          </Btn>
        </div>
      </div>
    </Modal>
  );
}

function RotationModal({ anchor, onSave, onClose }) {
  const [date, setDate] = useState(anchor.date);
  const [unit, setUnit] = useState(anchor.unit);
  return (
    <Modal title="⚙ Rotation Settings" onClose={onClose} width={380}>
      <p style={{color:C.textSub,fontSize:13,marginTop:0,lineHeight:1.6}}>
        Set a known reference point: pick a date and which unit was on duty that day at 0730.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <label style={base.lbl}>Reference Date</label>
          <input type="date" style={base.input} value={date} onChange={e=>setDate(e.target.value)}/>
        </div>
        <div>
          <label style={base.lbl}>Unit On Duty That Day</label>
          <div style={{display:"flex",gap:8}}>
            {UNIT_DEFS.map(u=>(
              <button key={u.key} onClick={()=>setUnit(u.key)}
                style={{flex:1,padding:"10px 8px",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:13,

}

// ROSTER TAB

function RosterTab({ roster, setRoster }) {
  const [q,        setQ]        = useState("");
  const [certFilt, setCertFilt] = useState(null);
  const [unitFilt, setUnitFilt] = useState(null);
  const [absFilt,  setAbsFilt]  = useState(null);
  const [editing,  setEditing]  = useState(null);
  const [del,      setDel]      = useState(null);

  const filtered = roster.filter(e=>{
    if(q&&!e.name.toLowerCase().includes(q.toLowerCase())) return false;
    if(certFilt&&!e.certs[certFilt]) return false;
    if(unitFilt&&e.unit!==unitFilt) return false;
    if(absFilt==="absent"&&!e.absence) return false;
    if(absFilt==="available"&&e.absence) return false;
    return true;
  });

  function saveEmp(emp) {
    const next=emp.id&&roster.find(e=>e.id===emp.id)
      ?roster.map(e=>e.id===emp.id?emp:e)
      :[...roster,{...emp,id:uid()}].sort((a,b)=>a.name.localeCompare(b.name));
    setRoster(next); setEditing(null);
  }
  function delEmp(id) { setRoster(roster.filter(e=>e.id!==id)); setDel(null); }
  function quickAbsence(emp, absKey) {
    setRoster(roster.map(e=>e.id===emp.id?{...e,absence:e.absence===absKey?null:absKey}:e));
  }

  const absentCount=roster.filter(e=>e.absence).length;

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:14}}>
        <input style={{...base.input,width:210}} placeholder="Search roster…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap",alignItems:"center"}}>
          <FilterPill label={`All (${roster.length})`}           active={!certFilt&&!unitFilt&&!absFilt} color={C.textSub}   onClick={()=>{setCertFilt(null);setUnitFilt(null);setAbsFilt(null);}}/>
          <FilterPill label={`Available (${roster.length-absentCount})`} active={absFilt==="available"} color={C.green}   onClick={()=>{setAbsFilt(p=>p==="available"?null:"available");setCertFilt(null);setUnitFilt(null);}}/>
          <FilterPill label={`Absent (${absentCount})`}         active={absFilt==="absent"}    color={C.red}    onClick={()=>{setAbsFilt(p=>p==="absent"?null:"absent");setCertFilt(null);setUnitFilt(null);}}/>
          {CERT_DEFS.map(c=><FilterPill key={c.key} label={c.label} active={certFilt===c.key} color={c.color} onClick={()=>{setCertFilt(p=>p===c.key?null:c.key);setUnitFilt(null);setAbsFilt(null);}}/>)}
          {UNIT_DEFS.map(u=><FilterPill key={u.key} label={u.label} active={unitFilt===u.key} color={u.color} onClick={()=>{setUnitFilt(p=>p===u.key?null:u.key);setCertFilt(null);setAbsFilt(null);}}/>)}
        </div>
        <Btn onClick={()=>setEditing({id:"",name:"",certs:{officer:false,operator:false,tillerman:false,paramedic:false,emt:false},unit:null,absence:null})} variant="primary">+ Add</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:8}}>
        {filtered.map(emp=>{
          const ud=unitDef(emp.unit);
          const ad=absenceDef(emp.absence);
          return (
            <div key={emp.id} style={{...base.card,display:"flex",gap:8,padding:"10px 13px",
              borderColor:ad?ad.color+"50":ud?ud.border:C.border, opacity:ad?.75:1}}>
              {ud&&!ad&&<div style={{width:4,height:"100%",minHeight:38,borderRadius:2,background:ud.color}}/>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{emp.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,flexWrap:"wrap"}}>
                  {ad?<AbsenceBadge absKey={emp.absence}/>:<CertChips certs={emp.certs}/>}
                  {ud&&!ad&&<UnitBadge unitKey={emp.unit} small/>}
                </div>
                <div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>
                  {ABSENCE_DEFS.map(a=>(
                    <button key={a.key} onClick={()=>quickAbsence(emp,a.key)}
                      style={{background:emp.absence===a.key?a.color:C.bg1,color:emp.absence===a.key?"#fff":a.color,
                        border:`1px solid ${a.color}50`,borderRadius:4,padding:"2px 6px",fontSize:10,cursor:"pointer",
                        transition:"all .1s"}}>
                      {a.icon} {a.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:5,flexShrink:0,alignSelf:"flex-start"}}>
                <Btn onClick={()=>setEditing({...emp,certs:{...emp.certs}})} variant="secondary" size="sm">✎</Btn>
                <Btn onClick={()=>setDel(emp)} variant="danger" size="sm">✕</Btn>
              </div>
            </div>
          );
        })}
      </div>
      {editing&&<EmpModal emp={editing} onSave={saveEmp} onClose={()=>setEditing(null)}/>}
      {del&&<Confirm msg={`Remove ${del.name}? This cannot be undone.`} onYes={()=>delEmp(del.id)} onNo={()=>setDel(null)}/>}
    </div>
  );
}

// STATIONS TAB

function StationsTab({ stations, setStations }) {
  const [editSt,   setEditSt]   = useState(null);
  const [editUnit, setEditUnit] = useState(null);
  const [confirm,  setConfirm]  = useState(null);

  function saveSt(st) {
    const next=stations.find(s=>s.id===st.id)?stations.map(s=>s.id===st.id?st:s):[...stations,st];
    setStations(next); setEditSt(null);
  }
  function delSt(id) { setStations(stations.filter(s=>s.id!==id)); setConfirm(null); }
  function saveUnit(stId,unit) {
    const next=stations.map(s=>{
      if(s.id!==stId) return s;
      return {...s,units:s.units.find(u=>u.id===unit.id)?s.units.map(u=>u.id===unit.id?unit:u):[...s.units,unit]};
    });
    setStations(next); setEditUnit(null);
  }
  function delUnit(stId,uid2) {
    setStations(stations.map(s=>s.id!==stId?s:{...s,units:s.units.filter(u=>u.id!==uid2)}));
    setConfirm(null);
  }

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <Btn onClick={()=>setEditSt({id:uid(),label:"",color:"#6366f1",units:[]})} variant="primary">+ Add Station</Btn>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {stations.map(st=>(
          <div key={st.id} style={{...base.card,borderColor:st.color+"60"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:4,height:22,borderRadius:2,background:st.color,flexShrink:0}}/>
              <span style={{fontWeight:800,fontSize:15,flex:1}}>{st.label}</span>
              <Btn onClick={()=>setEditSt({...st,units:[...st.units]})} variant="secondary" size="sm">✎ Edit</Btn>
              <Btn onClick={()=>setConfirm({type:"station",id:st.id,label:st.label})} variant="danger" size="sm">✕</Btn>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8}}>
              {st.units.map(unit=>(
                <div key={unit.id} style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:8,padding:10}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontWeight:700,fontSize:12}}>{unit.label}</span>
                    <div style={{display:"flex",gap:5}}>
                      <Btn onClick={()=>setEditUnit({stId:st.id,unit:{...unit,slots:unit.slots.map(s=>({...s}))}})} variant="secondary" size="sm">✎</Btn>
                      <Btn onClick={()=>setConfirm({type:"unit",stId:st.id,unitId:unit.id,label:unit.label})} variant="danger" size="sm">✕</Btn>
                    </div>
                  </div>
                  <div style={{fontSize:10,color:C.textMuted,marginBottom:6}}>Min staffing: {unit.minSlots}</div>
                  {unit.slots.map(sl=>(
                    <div key={sl.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11,color:C.textSub,padding:"2px 0"}}>
                      <span>{sl.label}</span>
                      {sl.requiredCert&&<span style={{background:certDef(sl.requiredCert)?.color+"20",color:certDef(sl.requiredCert)?.color,borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>{sl.requiredCert}</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{marginTop:10}}>
              <Btn onClick={()=>setEditUnit({stId:st.id,unit:{id:uid(),label:"",minSlots:1,slots:[]}})} variant="secondary" size="sm">+ Add Apparatus</Btn>
            </div>
          </div>
        ))}
      </div>
      {editSt&&<StModal st={editSt} onSave={saveSt} onClose={()=>setEditSt(null)}/>}
      {editUnit&&<UnitModal stId={editUnit.stId} unit={editUnit.unit} onSave={saveUnit} onClose={()=>setEditUnit(null)}/>}
      {confirm?.type==="station"&&<Confirm msg={`Delete "${confirm.label}" and all its apparatus?`} onYes={()=>delSt(confirm.id)} onNo={()=>setConfirm(null)}/>}
      {confirm?.type==="unit"&&<Confirm msg={`Delete "${confirm.label}"?`} onYes={()=>delUnit(confirm.stId,confirm.unitId)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
}

function UnitModal({ stId, unit, onSave, onClose }) {
